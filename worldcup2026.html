<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://www.gstatic.com https://cdn.jsdelivr.net; connect-src 'self' https://*.googleapis.com https://site.api.espn.com; img-src 'self' data: https://flagcdn.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com data:; worker-src 'self' blob:; object-src 'none'; base-uri 'none'; form-action 'none'">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIFA ワールドカップ 2026 予想シミュレーター</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Noto+Sans+JP:wght@400;500;700;900&display=swap');
:root{
  --bg:#04030d; --panel:rgba(150,165,255,.05); --panel2:rgba(150,165,255,.12);
  --line:rgba(165,185,255,.18); --text:#eef2ff; --sub:#9aa6d4;
  --accent:#ffd166; --green:#3bffb0; --red:#ff6ba6; --blue:#6db8ff; --cyan:#7df0ff;
  --q1:rgba(59,255,176,.10); --q3:rgba(255,209,102,.12);
  /* ホログラフィック・フォイル */
  --holo:linear-gradient(115deg,#ff6ba6,#ffd36b,#5bffb0,#6db8ff,#b58bff,#ff6ba6);
  --holo-soft:linear-gradient(115deg,rgba(255,107,166,.55),rgba(255,211,107,.5),rgba(91,255,176,.5),rgba(109,184,255,.55),rgba(181,139,255,.5));
  --gold-grad:linear-gradient(110deg,#fff3c4,#ffd166 42%,#ff9f43);
  --blue-grad:linear-gradient(135deg,rgba(109,184,255,.32),rgba(125,240,255,.08));
  --green-grad:linear-gradient(135deg,rgba(59,255,176,.30),rgba(59,255,176,.06));
  --disp:Oswald,"Noto Sans JP",sans-serif;
  --par-x:0px; --par-y:0px;
}
*{box-sizing:border-box;margin:0;padding:0}
::selection{background:rgba(125,240,255,.35)}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--holo-soft);border-radius:99px;border:2px solid transparent;background-clip:content-box}
::-webkit-scrollbar-thumb:hover{filter:brightness(1.3);border:2px solid transparent;background-clip:content-box}
html{overflow-x:clip;overscroll-behavior-x:none}
body{
  background:#04030d;color:var(--text);font-size:14px;min-height:100vh;
  overflow-x:clip;overscroll-behavior-x:none;width:100%;max-width:100%;
  font-family:"Noto Sans JP","Segoe UI","Hiragino Sans","Yu Gothic UI",sans-serif;
}
body::before{ /* ホログラフィック・ネビュラ（虹色が漂う／パララックス） */
  content:"";position:fixed;inset:-8%;z-index:-2;
  background:
    radial-gradient(48% 42% at 82% -8%, rgba(109,184,255,.32), transparent 62%),
    radial-gradient(46% 40% at 8% 18%, rgba(255,107,166,.24), transparent 62%),
    radial-gradient(52% 48% at 52% 116%, rgba(91,255,176,.20), transparent 62%),
    radial-gradient(40% 38% at 28% 72%, rgba(181,139,255,.22), transparent 62%),
    linear-gradient(180deg,#0a0820,#04030d 76%);
  transform:translate(var(--par-x),var(--par-y));
  animation:holoShift 22s ease-in-out infinite alternate;
}
body::after{ /* 近未来グリッド（中心からフェード／パララックス） */
  content:"";position:fixed;inset:0;z-index:-1;pointer-events:none;opacity:.45;
  background:
    linear-gradient(rgba(125,240,255,.05) 1px,transparent 1px) 0 0/44px 44px,
    linear-gradient(90deg,rgba(125,240,255,.05) 1px,transparent 1px) 0 0/44px 44px;
  transform:translate(calc(var(--par-x)*1.8),calc(var(--par-y)*1.8));
  -webkit-mask:radial-gradient(circle at 50% 34%, #000 38%, transparent 82%);
  mask:radial-gradient(circle at 50% 34%, #000 38%, transparent 82%);
}
@keyframes holoShift{0%{filter:hue-rotate(0deg) saturate(1.05)}100%{filter:hue-rotate(55deg) saturate(1.35)}}
header{
  position:sticky;top:0;z-index:50;padding:14px 22px 0;
  background:rgba(7,6,20,.72);backdrop-filter:blur(20px) saturate(1.5);-webkit-backdrop-filter:blur(20px) saturate(1.5);
  border-bottom:1px solid transparent;box-shadow:0 10px 40px rgba(0,0,0,.55);position:sticky;
}
header::after{ /* ホログラフィックなボーダー光 */
  content:"";position:absolute;left:0;right:0;bottom:0;height:1.5px;
  background:var(--holo);background-size:220% auto;animation:titleShine 6s linear infinite;opacity:.85;
}
h1{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap}
h1 .cup{font-size:25px;align-self:center;filter:drop-shadow(0 0 14px rgba(125,240,255,.8));animation:trophyFloat 3.2s ease-in-out infinite;transform-origin:50% 80%}
@keyframes trophyFloat{0%,100%{transform:translateY(0) rotate(-5deg)}50%{transform:translateY(-3px) rotate(5deg)}}
h1 .ttl{
  font-family:var(--disp);font-weight:700;font-size:28px;letter-spacing:3px;white-space:nowrap;
  background:linear-gradient(100deg,#ff6ba6,#ffd36b,#ffffff,#5bffb0,#6db8ff,#b58bff,#ff6ba6);
  background-size:300% auto;-webkit-background-clip:text;background-clip:text;color:transparent;
  animation:titleShine 8s linear infinite;filter:drop-shadow(0 0 16px rgba(125,240,255,.3));
}
@keyframes titleShine{0%{background-position:0% center}100%{background-position:300% center}}
h1 .sub{font-size:12px;color:var(--sub);font-weight:500}
h1 .jst{font-size:10.5px;color:var(--cyan);border:1px solid rgba(125,240,255,.4);border-radius:99px;padding:2px 11px;background:rgba(125,240,255,.08);white-space:nowrap;align-self:center}
/* 次の試合カウントダウン */
.next-match{display:flex;align-items:center;gap:12px;flex-wrap:wrap;padding:7px 2px 12px;font-size:12.5px}
.nm-tag{font-family:var(--disp);font-size:11px;letter-spacing:2px;font-weight:700;color:#04030d;background:var(--holo);background-size:200% auto;animation:titleShine 5s linear infinite;padding:2px 10px;border-radius:6px}
.nm-teams{font-weight:700;color:var(--text)}
.nm-jst{color:var(--sub);font-size:11px}
.nm-cd{margin-left:auto;font-size:12px;color:var(--cyan);display:flex;align-items:center;gap:5px}
.nm-cd b{font-family:var(--disp);font-size:18px;letter-spacing:1px;color:#fff;text-shadow:0 0 12px rgba(125,240,255,.75);font-variant-numeric:tabular-nums}
.nm-label{color:var(--cyan);font-weight:700}
.topbar{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
.toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.toolbar button{
  background:var(--panel);color:var(--text);border:1px solid var(--line);border-radius:10px;
  padding:7px 13px;cursor:pointer;font-size:12px;font-family:inherit;transition:all .2s;
}
.toolbar button{display:inline-flex;align-items:center;gap:0}
.toolbar button:hover{border-color:rgba(125,240,255,.6);box-shadow:0 0 16px rgba(125,240,255,.22);transform:translateY(-1px);color:var(--cyan)}
.ico{width:15px;height:15px;margin-right:7px;flex:0 0 auto;fill:none;stroke:currentColor;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;opacity:.92;transition:filter .2s}
.toolbar button:hover .ico{filter:drop-shadow(0 0 5px rgba(125,240,255,.8))}
.sico{display:inline-block;width:14px;height:14px;margin-right:5px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;vertical-align:-2px}
.sico.ok{stroke:var(--green);filter:drop-shadow(0 0 5px rgba(59,255,176,.55))}
.sico.warn{stroke:#ff9166;filter:drop-shadow(0 0 5px rgba(255,145,102,.5))}
.sico.spin{stroke:var(--cyan);animation:spin .9s linear infinite;transform-origin:50% 50%}
@keyframes spin{to{transform:rotate(360deg)}}
.tabs{display:flex;flex-wrap:wrap;gap:4px;margin:12px 0 12px;background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:4px}
.tabs button{
  background:none;border:none;color:var(--sub);padding:9px 20px;cursor:pointer;font-size:13.5px;
  font-weight:700;font-family:inherit;border-radius:10px;letter-spacing:.5px;transition:all .25s;
}
.tabs button:hover{color:var(--text)}
.tabs button.on{background:var(--holo);background-size:200% auto;animation:titleShine 6s linear infinite;color:#06121f;box-shadow:0 2px 20px rgba(125,240,255,.4)}
.live-dot{display:none;width:7px;height:7px;border-radius:50%;background:var(--green);margin-left:7px;box-shadow:0 0 8px var(--green);animation:livePulse 1.4s ease-in-out infinite;vertical-align:middle}
.live-dot.on{display:inline-block}
@keyframes livePulse{0%,100%{opacity:1}50%{opacity:.3}}
.toolbar button.minor{padding:7px 9px;opacity:.55}
.toolbar button.minor .ico{margin-right:0}
.toolbar button.minor:hover{opacity:1}
.mode-switch{display:flex;background:var(--panel);border:1px solid var(--line);border-radius:99px;padding:4px;gap:4px}
.mode-switch button{
  border:none;background:none;color:var(--sub);padding:8px 18px;border-radius:99px;cursor:pointer;
  font-size:13px;font-weight:700;font-family:inherit;transition:all .25s;
}
.mode-switch button.on.pred{background:linear-gradient(135deg,#62b6ff,#2f7fe0);color:#041022;box-shadow:0 2px 18px rgba(77,171,255,.5)}
.mode-switch button.on.actual{background:linear-gradient(135deg,#3df0a2,#13b86e);color:#02180d;box-shadow:0 2px 18px rgba(30,231,142,.45)}
.mode-toggle{display:inline-flex;align-items:center;gap:0;background:transparent;color:var(--sub);border:1px solid var(--line);border-radius:99px;padding:6px 14px;cursor:pointer;font-size:12px;font-weight:700;font-family:inherit;transition:all .2s}
.mode-toggle .ico{width:14px;height:14px;margin-right:6px;opacity:.85}
.mode-toggle:hover{color:var(--text);border-color:rgba(125,240,255,.5)}
.mode-toggle.active{background:linear-gradient(135deg,#3df0a2,#13b86e);color:#02180d;border-color:transparent;box-shadow:0 2px 16px rgba(59,255,176,.45)}
#warn-banner{display:none}
#champ-ribbon{display:none}
.champ-inner{display:flex;align-items:center;justify-content:center;gap:14px;padding:9px 16px;background:rgba(255,255,255,.03);border-bottom:2px solid var(--champ,#ffd166);box-shadow:inset 0 -26px 46px -30px var(--champ,#ffd166)}
.champ-txt{font-family:var(--disp);letter-spacing:3px;font-size:13px;color:var(--text);opacity:.9}
.champ-team{font-family:var(--disp);font-size:18px;font-weight:700;color:var(--champ,#ffd166);text-shadow:0 0 16px var(--champ,#ffd166)}
.champ-flag img.flag{width:30px;height:21px}
body.champ header::after{background:var(--champ,#ffd166)!important;opacity:1}
body.champ h1 .ttl{filter:drop-shadow(0 0 18px var(--champ,#ffd166))}
.warn-head{display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding:9px 22px;font-size:13px;color:#ffd9a6;
  background:linear-gradient(180deg,rgba(255,120,90,.22),rgba(255,90,140,.12));border-bottom:1px solid rgba(255,150,90,.4);
  box-shadow:0 0 26px rgba(255,120,90,.18) inset;animation:warnPulse 2.2s ease-in-out infinite}
@keyframes warnPulse{0%,100%{box-shadow:0 0 22px rgba(255,120,90,.14) inset}50%{box-shadow:0 0 34px rgba(255,120,90,.3) inset}}
.warn-head b{color:#ffcaa0}
.warn-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding:6px 22px;font-size:12.5px;background:rgba(255,100,90,.06);border-bottom:1px solid rgba(255,120,90,.12)}
.warn-time{font-family:var(--disp);color:#ff9166;font-weight:700;font-size:13px;letter-spacing:.5px}
.warn-teams{font-weight:700;color:var(--text)}
.warn-jst{color:var(--sub);font-size:11px}
.warn-row button{background:var(--panel2);border:1px solid rgba(255,150,90,.5);color:#ffd9a6;border-radius:8px;padding:4px 11px;font-size:11.5px;cursor:pointer;font-family:inherit;transition:all .15s}
.warn-row button:hover{background:rgba(255,150,90,.2)}
.warn-row .warn-x{border-color:var(--line);color:var(--sub);margin-left:auto}
.warn-row.urgent{background:rgba(255,80,90,.13)}
.warn-row.urgent .warn-time{color:#ff5d5d;text-shadow:0 0 8px rgba(255,93,93,.6)}
.warn-notify{margin-left:auto;background:rgba(125,240,255,.12)!important;border-color:rgba(125,240,255,.5)!important;color:var(--cyan)!important}
.modebanner{font-size:12px;color:var(--sub);padding:9px 22px;background:rgba(10,16,34,.55);border-bottom:1px solid var(--line)}
.modebanner b{color:var(--text)}
main{padding:18px 22px;max-width:1500px;margin:0 auto}
.groups-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(440px,1fr));gap:16px}
.group-card{
  background:linear-gradient(160deg,rgba(150,165,255,.07),rgba(150,165,255,.02));
  border:1px solid var(--line);border-radius:18px;padding:14px 16px;
  position:relative;overflow:hidden;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  transition:transform .14s ease,box-shadow .25s,border-color .25s;transform-style:preserve-3d;
}
.group-card::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;background:var(--holo);background-size:220% auto;animation:titleShine 7s linear infinite;opacity:.8}
.group-card::after{content:"";position:absolute;inset:0;pointer-events:none;opacity:0;transition:opacity .25s;
  background:radial-gradient(380px circle at var(--mx,50%) var(--my,0%), rgba(125,240,255,.16), transparent 45%)}
.group-card:hover{border-color:rgba(125,240,255,.4);box-shadow:0 18px 50px rgba(0,0,0,.6),0 0 30px rgba(125,240,255,.12)}
.group-card:hover::after{opacity:1}
.group-card h3{font-family:var(--disp);font-size:16px;letter-spacing:2px;color:var(--cyan);margin-bottom:9px;display:flex;align-items:center;gap:10px}
.group-card h3::after{content:"";flex:1;height:1px;background:linear-gradient(90deg,rgba(125,240,255,.5),transparent)}
table.standings{width:100%;border-collapse:collapse;font-size:12.5px;margin-bottom:10px}
table.standings th{color:var(--sub);font-weight:normal;text-align:right;padding:2px 6px;border-bottom:1px solid var(--line);font-size:11px}
table.standings th.tname{text-align:left}
table.standings td{padding:4px 6px;text-align:right;border-bottom:1px solid rgba(148,178,255,.08)}
table.standings td.tname{text-align:left;white-space:nowrap}
tr.q1 td{background:linear-gradient(90deg,rgba(30,231,142,.17),rgba(30,231,142,.03))}
tr.q1 td:first-child{box-shadow:inset 3px 0 0 var(--green)}
tr.q3 td{background:linear-gradient(90deg,rgba(255,209,102,.17),rgba(255,209,102,.03))}
tr.q3 td:first-child{box-shadow:inset 3px 0 0 var(--accent)}
.match-row{
  display:grid;grid-template-columns:62px 1fr 104px 1fr 80px;align-items:center;gap:4px;
  padding:4px 2px;border-top:1px dashed rgba(148,178,255,.15);font-size:12.5px;border-radius:8px;transition:background .15s;
}
.match-row:hover{background:rgba(148,178,255,.05)}
.match-row .date{color:var(--sub);font-size:10.5px;line-height:1.25}
.match-row .home,.match-row .away{display:flex;align-items:center;min-width:0;white-space:nowrap}
.match-row .home{justify-content:flex-end}
.match-row .away{justify-content:flex-start}
.match-row .home .tn,.match-row .away .tn{overflow:hidden;text-overflow:ellipsis;min-width:0}
.score-in{display:flex;align-items:center;justify-content:center;gap:3px}
.score-in input{width:32px;background:rgba(5,9,20,.7);color:var(--text);border:1px solid var(--line);border-radius:6px;text-align:center;padding:3px 1px;font-size:13px}
.score-in input:focus{border-color:var(--accent);outline:none;box-shadow:0 0 10px rgba(255,209,102,.3)}
img.flag{width:20px;height:14px;object-fit:cover;border-radius:3px;vertical-align:-2px;box-shadow:0 0 0 1px rgba(255,255,255,.18),0 2px 6px rgba(0,0,0,.45);flex:0 0 auto;margin:0 4px}
.oc-name{cursor:pointer;border-radius:8px;padding:3px 6px;border:1px solid transparent;transition:all .18s}
.oc-name:hover{background:var(--panel2);transform:scale(1.02)}
.oc-name.sel{background:var(--blue-grad);border-color:rgba(77,171,255,.7);box-shadow:0 0 12px rgba(77,171,255,.28)}
.oc-mid{display:flex;align-items:center;justify-content:center;gap:3px}
.oc-mid input{width:26px;background:rgba(5,9,20,.7);color:var(--text);border:1px solid rgba(148,178,255,.2);border-radius:6px;text-align:center;padding:2px 0;font-size:12px}
.oc-mid input:focus{border-color:var(--accent);outline:none;box-shadow:0 0 10px rgba(255,209,102,.3)}
.oc-btn{background:var(--panel2);border:1px solid var(--line);color:var(--sub);border-radius:7px;padding:3px 8px;cursor:pointer;font-size:11.5px;font-family:inherit;transition:all .18s}
.oc-btn:hover{color:var(--text)}
.oc-btn.sel{background:var(--blue-grad);border-color:rgba(77,171,255,.7);color:var(--text);box-shadow:0 0 12px rgba(77,171,255,.28)}
#fetch-status{font-size:11px;color:var(--sub);align-self:center;white-space:nowrap}
.other-info{font-size:10.5px;color:var(--sub);text-align:center;white-space:normal;line-height:1.35;word-break:keep-all;min-width:0}
.score-txt{text-align:center;font-weight:bold;font-size:14px;font-family:var(--disp);letter-spacing:1px}
.judge{display:inline-flex;align-items:center;font-size:10px;font-weight:700;padding:1px 8px;border-radius:99px;letter-spacing:.3px;line-height:1.6;white-space:nowrap}
.judge.exact{color:#1a1300;background:var(--holo);background-size:200% auto;animation:titleShine 4s linear infinite;box-shadow:0 0 12px rgba(255,211,107,.4)}
.judge.outcome{color:var(--green);background:rgba(59,255,176,.12);border:1px solid rgba(59,255,176,.4)}
.judge.miss{color:var(--red);background:rgba(255,107,166,.1);border:1px solid rgba(255,107,166,.35)}
.coin-up{color:var(--green);font-weight:700}
.coin-dn{color:var(--red);font-weight:700}
.frank{font-size:9.5px;color:var(--sub);margin-left:5px;font-family:var(--disp);letter-spacing:.5px;opacity:.8}
.pav{display:inline-flex;align-items:center;justify-content:center;border-radius:50%;border:1.5px solid var(--pc,#94a4c9);background:#0a0c18;line-height:1;flex:0 0 auto;vertical-align:middle;box-shadow:0 0 8px -2px var(--pc,#94a4c9);overflow:hidden}
.pav.empty{background:var(--pc,#94a4c9)}
.pav img{width:100%;height:100%;object-fit:cover;display:block}
/* アカウント設定モーダル */
.modal{position:fixed;inset:0;z-index:200;display:flex;align-items:center;justify-content:center;background:rgba(2,3,10,.7);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);padding:16px}
.modal-panel{background:#0a0c1a;border:1px solid var(--line);border-radius:18px;padding:18px;max-width:380px;width:100%;max-height:88vh;overflow:auto;box-shadow:0 30px 80px rgba(0,0,0,.6);position:relative}
.modal-panel::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;background:var(--holo);background-size:200% auto;animation:titleShine 6s linear infinite}
.set-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.set-head h3{font-family:var(--disp);font-size:16px;letter-spacing:1.5px;color:var(--cyan)}
.set-close{background:var(--panel2);border:1px solid var(--line);color:var(--sub);border-radius:8px;width:30px;height:30px;cursor:pointer;font-size:14px}
.set-avatar{display:flex;justify-content:center;margin:6px 0 12px}
.set-actions{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.set-btn{background:var(--panel2);border:1px solid var(--line);color:var(--text);border-radius:10px;padding:8px 14px;cursor:pointer;font-size:12.5px;font-family:inherit}
.set-btn.primary{background:var(--holo);background-size:200% auto;animation:titleShine 5s linear infinite;color:#06121f;border:none;font-weight:700}
.set-btn:hover{border-color:rgba(125,240,255,.6)}
.set-label{font-size:11px;color:var(--sub);margin:14px 0 6px;font-weight:700}
.set-input{width:100%;background:rgba(5,9,20,.7);color:var(--text);border:1px solid var(--line);border-radius:10px;padding:9px 11px;font-size:14px;font-family:inherit}
.acct-box{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:4px}
.acct-box .set-input{flex:1 1 180px;width:auto;min-width:0}
.acct-box.on{background:var(--panel2);border:1px solid rgba(30,231,142,.4);border-radius:10px;padding:8px 11px;justify-content:space-between}
.acct-box .online-status.on{color:var(--green);font-size:12.5px;font-weight:700}
.set-input:focus{outline:none;border-color:var(--cyan)}
.color-pick{display:flex;gap:7px;flex-wrap:wrap}
.color-pick button{width:28px;height:28px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:all .15s;padding:0}
.color-pick button.on{border-color:#fff;box-shadow:0 0 10px rgba(255,255,255,.5);transform:scale(1.1)}
.prof-row{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.prof-meta{display:flex;flex-direction:column;gap:8px;min-width:0}
.prof-name{align-self:flex-start;background:var(--panel2);border:1px solid var(--line);color:var(--text);border-radius:8px;padding:5px 12px;cursor:pointer;font-size:13px;font-weight:700;font-family:inherit}
.prof-name:hover{border-color:rgba(125,240,255,.6)}
.avatar-pick{display:flex;flex-wrap:wrap;gap:5px}
.avatar-pick button{width:30px;height:30px;border-radius:8px;border:1px solid var(--line);background:var(--panel);cursor:pointer;font-size:16px;line-height:1;transition:all .15s;display:inline-flex;align-items:center;justify-content:center}
.avatar-pick button:hover{border-color:rgba(125,240,255,.6);transform:translateY(-1px)}
.avatar-pick button.on{border-color:var(--cyan);box-shadow:0 0 12px rgba(125,240,255,.4);background:rgba(125,240,255,.12)}
.avatar-pick .av-custom{color:var(--sub);font-family:var(--disp);font-size:18px}
.thirds-panel{
  background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:14px 18px;margin-top:16px;
  position:relative;overflow:hidden;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
}
.thirds-panel::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;background:var(--gold-grad);opacity:.6}
.thirds-panel h3{font-family:var(--disp);font-size:15px;letter-spacing:1.5px;color:var(--accent);margin-bottom:9px}
.thirds-list{display:flex;flex-wrap:wrap;gap:6px}
.third-chip{background:var(--panel2);border:1px solid var(--line);border-radius:99px;padding:4px 12px;font-size:12px;color:var(--sub);transition:all .2s}
.third-chip.in{border-color:rgba(30,231,142,.6);color:var(--text);background:var(--green-grad);box-shadow:0 0 10px rgba(30,231,142,.15)}
.third-chip .rank{color:var(--sub);font-size:10px;margin-right:4px}
.hint{font-size:12px;color:var(--sub);margin:6px 0 12px;line-height:1.8}
/* bracket */
.bracket-wrap{overflow:auto;max-height:74vh;padding-bottom:10px;cursor:grab;position:relative;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;scroll-snap-type:x proximity;scroll-padding-left:14px}
.bracket-wrap.grabbing{cursor:grabbing;user-select:none}
.bracket-sizer{position:relative}
.bracket{display:flex;gap:22px;min-width:1280px;position:relative;transform-origin:0 0;will-change:transform}
.zoom-ctrl{display:inline-flex;gap:4px;margin:0 0 8px;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:4px}
.zoom-ctrl button{background:var(--panel2);border:1px solid var(--line);color:var(--text);border-radius:7px;min-width:34px;padding:5px 8px;cursor:pointer;font-size:13px;font-weight:700;font-family:var(--disp);transition:all .15s}
.zoom-ctrl button:hover{border-color:rgba(125,240,255,.6);box-shadow:0 0 12px rgba(125,240,255,.2)}
svg.bracket-svg{position:absolute;inset:0;pointer-events:none;z-index:0;overflow:visible}
.bracket-line{fill:none;stroke:#7df0ff;stroke-width:1.5;opacity:.42;stroke-dasharray:5 8;
  animation:flowDash .9s linear infinite;filter:drop-shadow(0 0 3px rgba(125,240,255,.7))}
@keyframes flowDash{to{stroke-dashoffset:-13}}
@media (prefers-reduced-motion: reduce){ .bracket-line{animation:none} }
.round{display:flex;flex-direction:column;min-width:215px;flex:1;position:relative;z-index:1;scroll-snap-align:start}
.ko-bar{display:flex;gap:8px;align-items:center;margin:0 0 10px}
.ko-bar .zoom-ctrl{margin:0;flex:0 0 auto}
.ko-rounds{display:flex;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;margin:0;flex:1 1 auto;min-width:0;padding-bottom:2px;scrollbar-width:none}
.ko-rounds::-webkit-scrollbar{display:none}
.ko-rounds button{flex:0 0 auto;background:var(--panel2);border:1px solid var(--line);color:var(--sub);border-radius:99px;padding:6px 14px;font-size:12px;font-weight:700;font-family:var(--disp);letter-spacing:1px;cursor:pointer;white-space:nowrap;transition:all .2s}
.ko-rounds button:hover{color:var(--text);border-color:rgba(125,240,255,.5)}
.ko-rounds button.on{background:var(--holo);background-size:200% auto;animation:titleShine 6s linear infinite;color:#06121f;border-color:transparent;box-shadow:0 0 16px rgba(125,240,255,.35)}
.round h4{
  text-align:center;font-family:var(--disp);font-size:14px;letter-spacing:2.5px;padding:6px 0 8px;position:sticky;top:0;
  background:var(--holo);background-size:200% auto;-webkit-background-clip:text;background-clip:text;color:transparent;animation:titleShine 7s linear infinite;
}
.round h4::after{content:"";display:block;width:46px;height:2px;margin:6px auto 0;background:var(--holo);background-size:200% auto;animation:titleShine 7s linear infinite;border-radius:2px;opacity:.9}
.round .matches{display:flex;flex-direction:column;justify-content:space-around;flex:1;gap:8px}
.ko-card{background:linear-gradient(160deg,rgba(150,165,255,.08),rgba(150,165,255,.02));border:1px solid var(--line);border-radius:13px;padding:7px 9px;transition:transform .14s ease,box-shadow .2s,border-color .2s;position:relative;z-index:1;transform-style:preserve-3d;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.ko-card::after{content:"";position:absolute;inset:0;border-radius:13px;pointer-events:none;opacity:0;transition:opacity .25s;background:radial-gradient(260px circle at var(--mx,50%) var(--my,0%),rgba(125,240,255,.16),transparent 50%)}
.ko-card:hover{border-color:rgba(125,240,255,.42);box-shadow:0 10px 30px rgba(0,0,0,.5),0 0 22px rgba(125,240,255,.12)}
.ko-card:hover::after{opacity:1}
.ko-card .meta{font-size:10px;color:var(--sub);margin-bottom:4px;display:flex;justify-content:space-between;gap:6px}
.ko-team{display:flex;align-items:center;gap:6px;padding:5px 8px;border-radius:9px;font-size:12.5px;border:1px solid transparent;transition:all .18s}
.ko-team .nm{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ko-team .sc{font-weight:bold;min-width:20px;text-align:center;font-family:var(--disp);font-size:14px}
.ko-team.placeholder .nm{color:var(--sub);font-style:italic;font-size:11.5px}
.ko-team.clickable{cursor:pointer}
.ko-team.clickable:hover{background:var(--panel2);transform:scale(1.02)}
.ko-team.picked{background:linear-gradient(135deg,rgba(125,240,255,.28),rgba(109,184,255,.08));border-color:rgba(125,240,255,.75);box-shadow:0 0 16px rgba(125,240,255,.4)}
.ko-team.won{background:var(--green-grad);border-color:rgba(59,255,176,.7);box-shadow:0 0 14px rgba(59,255,176,.3)}
.ko-team.lost{opacity:.4;filter:saturate(.45)}
.ko-res{display:flex;align-items:center;gap:5px;justify-content:center;margin-top:5px;flex-wrap:wrap}
.ko-res .pk{font-size:10.5px;color:var(--green)}
.champion{
  position:relative;overflow:hidden;text-align:center;margin-top:10px;padding:16px;border-radius:16px;transform-style:preserve-3d;
  background:linear-gradient(135deg,rgba(125,240,255,.14),rgba(181,139,255,.06));
  border:1px solid transparent;box-shadow:0 0 40px rgba(125,240,255,.16);
}
.champion::before{content:"";position:absolute;inset:0;border-radius:16px;padding:1.5px;background:var(--holo);background-size:220% auto;animation:titleShine 6s linear infinite;
  -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none}
.champion::after{
  content:"";position:absolute;top:-60%;bottom:-60%;left:-45%;width:36%;
  background:linear-gradient(105deg,transparent,rgba(255,255,255,.3),transparent);
  transform:skewX(-20deg);animation:shine 3.2s ease-in-out infinite;
}
@keyframes shine{0%{left:-45%}55%,100%{left:135%}}
.champion .t{font-size:12px;color:var(--cyan);letter-spacing:2px}
.champion .nm{
  font-family:var(--disp);font-size:23px;font-weight:700;margin-top:5px;
  background:var(--holo);background-size:240% auto;-webkit-background-clip:text;background-clip:text;color:transparent;animation:titleShine 6s linear infinite;
}
/* comparison */
.cmp-cards{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px}
.cmp-card{
  background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:14px 22px;min-width:170px;
  position:relative;overflow:hidden;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);transition:all .25s;
}
.cmp-card::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;background:var(--holo);background-size:220% auto;animation:titleShine 7s linear infinite;opacity:.8}
.cmp-card::after{content:"";position:absolute;inset:0;pointer-events:none;opacity:0;transition:opacity .25s;background:radial-gradient(260px circle at var(--mx,50%) var(--my,0%),rgba(125,240,255,.16),transparent 50%)}
.cmp-card:hover{box-shadow:0 14px 40px rgba(0,0,0,.55),0 0 24px rgba(125,240,255,.1);border-color:rgba(125,240,255,.4)}
.cmp-card:hover::after{opacity:1}
.cmp-card .v{
  font-family:var(--disp);font-size:34px;font-weight:700;letter-spacing:1px;
  background:var(--holo);background-size:240% auto;-webkit-background-clip:text;background-clip:text;color:transparent;animation:titleShine 7s linear infinite;
}
.cmp-card .l{font-size:11.5px;color:var(--sub);margin-top:3px}
.cmp-section{
  background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:14px 18px;margin-bottom:14px;
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
}
.cmp-section h3{font-family:var(--disp);font-size:15px;letter-spacing:1.5px;color:var(--accent);margin-bottom:10px}
table.cmp{width:100%;border-collapse:collapse;font-size:12.5px}
table.cmp th{color:var(--sub);font-weight:normal;padding:4px 8px;border-bottom:1px solid var(--line);text-align:left;font-size:11.5px}
table.cmp td{padding:5px 8px;border-bottom:1px solid rgba(148,178,255,.08)}
table.cmp tr:hover td{background:rgba(148,178,255,.05)}
.ko-cmp-round{margin-bottom:10px}
.ko-cmp-round .rt{font-size:13px;font-weight:700;margin-bottom:5px}
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{background:var(--panel2);border:1px solid var(--line);border-radius:99px;padding:3px 12px;font-size:12px;transition:all .2s}
.chip.hit{border-color:rgba(30,231,142,.65);background:var(--green-grad);box-shadow:0 0 10px rgba(30,231,142,.15)}
.chip.hit::after{content:" ✓";color:var(--green);font-weight:bold}
footer{
  margin-top:30px;padding:16px 22px 24px;font-size:10.5px;color:var(--sub);line-height:1.7;
  background:rgba(6,10,22,.4);border-top:1px solid var(--line);
}
.empty-note{color:var(--sub);padding:40px;text-align:center;font-size:13px;line-height:2}

/* ===== プレイヤーチップ / ヘッダー右 ===== */
.head-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.player-chip{
  display:flex;align-items:center;gap:7px;cursor:pointer;font-size:12.5px;font-weight:700;
  background:var(--panel2);border:1px solid var(--line);border-radius:99px;padding:6px 12px;transition:all .2s;
}
.player-chip:hover{border-color:rgba(255,209,102,.6);box-shadow:0 0 16px rgba(255,209,102,.18)}
.player-chip .dot{width:11px;height:11px;border-radius:50%;box-shadow:0 0 8px currentColor}
.player-chip .coins{color:var(--accent);font-family:var(--disp);letter-spacing:.5px}
.player-chip .coins .lk{color:var(--sub);font-size:10px;font-family:inherit}

/* ===== ベットバー ===== */
.match-block{border-top:1px dashed rgba(148,178,255,.15)}
.match-block .match-row{border-top:none}
.bet-bar{
  display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:8px 10px;padding:6px 10px 9px;font-size:11px;
}
.bet-bar .odds-set{display:flex;gap:4px;flex-wrap:wrap;justify-content:center}
.bet-bar .od{
  color:var(--sub);background:rgba(5,9,20,.5);border:1px solid var(--line);border-radius:6px;
  padding:2px 7px;font-family:var(--disp);letter-spacing:.5px;font-size:11px;
}
.bet-bar .od.on{color:#041022;background:linear-gradient(135deg,#ffd166,#ff9f43);border-color:transparent;font-weight:700;box-shadow:0 0 12px rgba(255,193,77,.4)}
.bet-ctrl{display:flex;align-items:center;justify-content:center;gap:4px;flex-wrap:wrap}
.bet-ctrl .stake{width:62px;background:rgba(5,9,20,.7);color:var(--accent);border:1px solid rgba(255,209,102,.4);border-radius:6px;text-align:center;padding:3px;font-size:13px;font-weight:700;font-family:var(--disp)}
.bet-ctrl .stake:focus{outline:none;border-color:var(--accent);box-shadow:0 0 10px rgba(255,209,102,.35)}
.bet-ctrl button{
  background:var(--panel2);color:var(--text);border:1px solid var(--line);border-radius:6px;
  padding:3px 7px;font-size:11px;cursor:pointer;font-family:inherit;transition:all .15s;
}
.bet-ctrl button:hover{border-color:rgba(255,209,102,.6);background:rgba(255,209,102,.12)}
.bet-ctrl button.allin{border-color:rgba(255,93,122,.5);color:#ff8fa3}
.bet-ctrl button.allin:hover{background:rgba(255,93,122,.18)}
.bet-ctrl button.clr{border-color:transparent;color:var(--sub)}
.bet-bar .bet-note{color:var(--sub)}
.bet-bar .payout{color:var(--sub)}
.bet-bar .payout .gain{color:var(--green);font-family:var(--disp);font-size:13px}
.perfect-hint{color:#ffd36b;font-size:10.5px}
.perfect-tag{display:inline-block;font-size:10px;font-weight:700;color:#06121f;background:var(--holo);background-size:200% auto;animation:titleShine 4s linear infinite;border-radius:5px;padding:1px 7px;margin-left:4px;box-shadow:0 0 12px rgba(255,211,107,.5)}
.bet-bar.settled{padding-top:3px}
.bet-bar.settled .bet-res b{font-family:var(--disp);font-size:13px}
.bet-bar.settled.win .bet-res{color:var(--green)}
.bet-bar.settled.lose .bet-res{color:var(--red)}
.bet-bar.locked .bet-note{color:var(--accent)}
.bet-bar.ko{padding:7px 4px 2px;flex-direction:column;align-items:stretch;gap:5px;border-top:1px dashed rgba(148,178,255,.15);margin-top:6px}
.bet-bar.ko .odds-set{flex-wrap:wrap}
.bet-bar.ko .od{font-size:10px;padding:2px 6px}
.bet-bar.ko .bet-ctrl{flex-wrap:wrap}
.bet-bar.ko .bet-ctrl .stake{width:52px}
.bet-bar.ko .bet-ctrl button{padding:2px 6px;font-size:10px}
.bet-bar.ko .payout{font-size:10.5px}

/* ===== 演出（紙吹雪キャンバス・祝福バナー） ===== */
#fx-canvas{position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:9999}
.fx-banner{
  position:fixed;top:16%;left:50%;z-index:10000;pointer-events:none;white-space:nowrap;
  font-family:var(--disp);font-size:clamp(20px,5vw,34px);letter-spacing:2px;font-weight:700;padding:14px 32px;
  color:#221500;background:var(--gold-grad);border-radius:14px;
  box-shadow:0 14px 55px rgba(255,193,77,.6),inset 0 0 0 1px rgba(255,255,255,.45);
  animation:fxBannerPop 1.9s cubic-bezier(.2,1.2,.3,1) forwards;
}
@keyframes fxBannerPop{
  0%{opacity:0;transform:translateX(-50%) scale(.5) translateY(12px)}
  14%{opacity:1;transform:translateX(-50%) scale(1.1)}
  28%{transform:translateX(-50%) scale(1)}
  80%{opacity:1;transform:translateX(-50%) scale(1)}
  100%{opacity:0;transform:translateX(-50%) scale(1) translateY(-16px)}
}
@media(prefers-reduced-motion:reduce){
  h1 .ttl,h1 .cup{animation:none}
}

/* ===== 表示切替（グループ別 / 日程順） ===== */
.view-toggle{display:inline-flex;gap:4px;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:4px;margin-bottom:14px}
.view-toggle button{background:none;border:none;color:var(--sub);padding:7px 16px;border-radius:9px;cursor:pointer;font-size:12.5px;font-weight:700;font-family:inherit;transition:all .2s}
.view-toggle button:hover{color:var(--text)}
.view-toggle button.on{background:var(--gold-grad);color:#221500;box-shadow:0 2px 14px rgba(255,193,77,.4)}
.bydate-list{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:8px 14px 14px;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);position:relative;overflow:hidden}
.bydate-list::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;background:var(--gold-grad);opacity:.6}
.day-header{font-family:var(--disp);font-size:14px;letter-spacing:1px;color:var(--accent);margin:16px 0 2px;padding-bottom:5px;border-bottom:1px solid rgba(255,209,102,.25);display:flex;align-items:center;gap:6px}
.day-header:first-child{margin-top:4px}
.gtag{display:inline-block;background:var(--panel2);border:1px solid var(--line);color:var(--sub);border-radius:5px;font-size:9px;font-weight:700;padding:0 4px;margin-right:3px;font-family:var(--disp);vertical-align:1px}
/* カレンダー */
.cal-list{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:8px 14px 16px;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);position:relative;overflow:hidden}
.cal-list::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;background:var(--holo);background-size:220% auto;animation:titleShine 7s linear infinite;opacity:.6}
.cal-row{display:grid;grid-template-columns:88px 1fr auto;align-items:center;gap:10px;padding:8px 4px;border-top:1px dashed rgba(148,178,255,.13)}
.cal-time{color:var(--cyan);font-size:11px;font-family:var(--disp);letter-spacing:.5px;line-height:1.3}
.cal-mid{min-width:0}
.cal-home,.cal-away{font-weight:700;font-size:12.5px}
.cal-vs{color:var(--sub);font-size:11px;margin:0 6px}
.cal-sc{color:var(--text);font-family:var(--disp);font-size:14px;margin:0 6px}
.cal-meta{display:block;color:var(--sub);font-size:10px;margin-top:2px}
.cal-bc{display:flex;gap:4px;flex-wrap:wrap;justify-content:flex-end}
.bc{font-size:9.5px;font-weight:700;padding:2px 7px;border-radius:6px;white-space:nowrap;letter-spacing:.3px}
.bc-dazn{background:#0a1a2e;color:#00d4ff;border:1px solid rgba(0,212,255,.5)}
.bc-nhk{background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.35)}
.bc-ntv{background:rgba(255,90,120,.12);color:#ff8fa3;border:1px solid rgba(255,90,120,.4)}
.bc-fuji{background:rgba(125,240,255,.1);color:var(--cyan);border:1px solid rgba(125,240,255,.4)}
/* カレンダー（グリッド） */
.cal-grid-wrap{display:flex;flex-wrap:wrap;gap:16px}
.cal-month{flex:1 1 300px;background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:12px 12px 14px;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.cal-mtitle{font-family:var(--disp);font-size:15px;letter-spacing:1px;color:var(--cyan);text-align:center;margin-bottom:10px}
.cal-grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:4px}
.cal-wd{text-align:center;font-size:10px;color:var(--sub);padding:2px 0}
.cal-wd.sun{color:#ff8fa3}.cal-wd.sat{color:#7fb6ff}
.cal-cell{position:relative;min-width:0;min-height:48px;border-radius:8px;border:1px solid transparent;display:flex;flex-direction:column;align-items:center;padding:3px 2px;font-size:12px;color:var(--sub);overflow:hidden}
.cal-cell.empty{border:none;min-height:0}
.cal-cell .cal-d{font-family:var(--disp);font-size:11px;align-self:flex-start;line-height:1;padding-left:2px}
.cal-cell.has{background:var(--panel2);border-color:var(--line);color:var(--text);cursor:pointer;transition:all .15s}
.cal-cell.has:hover{border-color:rgba(125,240,255,.6);box-shadow:0 0 12px rgba(125,240,255,.2)}
.cal-cell.today{box-shadow:inset 0 0 0 1.5px var(--cyan)}
.cal-cell.sel{background:var(--blue-grad);border-color:var(--cyan);box-shadow:0 0 14px rgba(125,240,255,.35)}
.cal-fxs{display:flex;flex-direction:column;gap:2px;width:100%;margin-top:3px;align-items:center}
.cal-fx{display:flex;align-items:center;gap:1px;justify-content:center;line-height:1;border-radius:4px;padding:0 1px}
.cal-fx.jp{background:rgba(255,93,122,.18)}
.cal-fxs .flag{width:15px;height:11px;margin:0;border-radius:2px;box-shadow:0 0 0 1px rgba(255,255,255,.14)}
.cal-x{font-size:7px;color:var(--sub);margin:0 1px}
.cal-rd{font-size:8px;font-weight:700;color:var(--cyan);background:rgba(125,240,255,.08);border:1px solid rgba(125,240,255,.25);border-radius:4px;padding:1px 3px;line-height:1.2;text-align:center;white-space:normal;word-break:keep-all;max-width:100%}
@media(max-width:520px){ .cal-month{flex:1 1 100%} .cal-cell{font-size:11px} .cal-fxs .flag{width:14px;height:10px} }
@media(max-width:520px){
  .cal-row{grid-template-columns:1fr auto;gap:6px}
  .cal-time{grid-column:1/-1;color:var(--cyan)}
  .cal-bc{justify-content:flex-start;grid-column:1/-1}
}

/* ===== リーグタブ ===== */
.league-wrap{display:flex;flex-direction:column;gap:18px}
.league-section{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:16px 18px;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);position:relative;overflow:hidden}
.league-section::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;background:var(--gold-grad);opacity:.6}
.league-section h3{font-family:var(--disp);font-size:17px;letter-spacing:1.5px;color:var(--accent);margin-bottom:12px;display:flex;align-items:center;gap:10px}
.league-section h3::after{content:"";flex:1;height:1px;background:linear-gradient(90deg,rgba(255,209,102,.5),transparent)}
table.lb{width:100%;border-collapse:collapse;font-size:13px}
table.lb th{color:var(--sub);font-weight:500;text-align:right;padding:6px 8px;border-bottom:1px solid var(--line);font-size:11px;white-space:nowrap}
table.lb th.l{text-align:left}
table.lb td{padding:8px;text-align:right;border-bottom:1px solid rgba(148,178,255,.08);white-space:nowrap}
table.lb td.l{text-align:left}
table.lb tr.me td{background:linear-gradient(90deg,rgba(77,171,255,.14),transparent)}
table.lb .pname{display:inline-flex;align-items:center;gap:7px;font-weight:700}
table.lb .pdot{width:10px;height:10px;border-radius:50%;box-shadow:0 0 7px currentColor}
table.lb .rk{font-family:var(--disp);font-size:15px;color:var(--accent);width:30px;display:inline-block}
table.lb .coin{font-family:var(--disp);color:var(--accent);font-size:15px}
table.lb .up{color:var(--green)} table.lb .dn{color:var(--red)}
.badges{display:flex;flex-wrap:wrap;gap:5px}
.badge{font-size:10.5px;padding:2px 8px;border-radius:99px;background:rgba(255,209,102,.12);border:1px solid rgba(255,209,102,.35);color:var(--accent);white-space:nowrap}
.badge.silver{background:rgba(148,178,255,.12);border-color:var(--line);color:var(--sub)}
.share-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-top:6px}
.share-row textarea{flex:1;min-width:220px;height:54px;background:rgba(5,9,20,.7);color:var(--text);border:1px solid var(--line);border-radius:10px;padding:8px;font-size:11px;font-family:monospace;resize:vertical}
.share-row button,.online-box button{background:var(--panel2);color:var(--text);border:1px solid var(--line);border-radius:10px;padding:8px 14px;cursor:pointer;font-size:12.5px;font-family:inherit;transition:all .2s}
.share-row button:hover,.online-box button:hover{border-color:rgba(255,209,102,.6);box-shadow:0 0 14px rgba(255,209,102,.18)}
.online-box{display:flex;flex-direction:column;gap:10px}
.online-box .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.online-box input,.online-box textarea{background:rgba(5,9,20,.7);color:var(--text);border:1px solid var(--line);border-radius:10px;padding:8px;font-size:12px;font-family:inherit}
.online-box input{min-width:160px}
.online-box textarea{width:100%;height:90px;font-family:monospace;font-size:11px}
.online-status{font-size:12px;padding:6px 12px;border-radius:99px;display:inline-flex;align-items:center;gap:6px}
.online-status.on{background:rgba(30,231,142,.14);border:1px solid rgba(30,231,142,.4);color:var(--green)}
.online-status.off{background:rgba(148,178,255,.08);border:1px solid var(--line);color:var(--sub)}
.steps{font-size:12px;color:var(--sub);line-height:1.8;padding-left:2px}
.steps b{color:var(--text)}
.friend-view{margin-top:8px}
.friend-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.friend-tabs button{background:var(--panel2);border:1px solid var(--line);color:var(--sub);border-radius:99px;padding:5px 13px;cursor:pointer;font-size:12px;font-weight:700;font-family:inherit;transition:all .2s}
.friend-tabs button.on{background:var(--blue-grad);border-color:rgba(77,171,255,.6);color:var(--text)}
/* オンラインルーム強調＋コード共有の折りたたみ */
.league-section.online-main{border-color:rgba(125,240,255,.4);box-shadow:0 0 30px rgba(125,240,255,.1)}
.online-box .join-btn{background:var(--holo)!important;background-size:200% auto!important;animation:titleShine 5s linear infinite;color:#06121f!important;border:none!important;font-weight:700}
.online-box code{background:rgba(125,240,255,.1);border:1px solid var(--line);border-radius:4px;padding:0 5px;color:var(--cyan);font-size:11px}
details.share-fallback{cursor:default}
details.share-fallback>summary{cursor:pointer;font-family:var(--disp);font-size:13px;letter-spacing:1px;color:var(--sub);list-style:none;padding:2px 0;transition:color .2s}
details.share-fallback>summary:hover{color:var(--cyan)}
details.share-fallback>summary::-webkit-details-marker{display:none}
details.share-fallback>summary::before{content:"▸ ";color:var(--cyan)}
details.share-fallback[open]>summary::before{content:"▾ "}
details.share-fallback[open]>summary{margin-bottom:10px}

@media(max-width:760px){
  main{padding:14px 12px}
  header{padding:12px 12px 0}
  .league-section,.cmp-section,.bydate-list,.group-card{padding:13px 13px}
  table.lb,table.cmp{display:block;width:100%;overflow-x:auto;white-space:nowrap;-webkit-overflow-scrolling:touch}
  .cmp-card{min-width:0;flex:1 1 140px;padding:12px 14px}
  .cmp-card .v{font-size:26px}
  .next-match{gap:8px}
  .online-box input{min-width:0;flex:1 1 140px}
}
@media(max-width:520px){
  .groups-grid{grid-template-columns:1fr}
  .match-row{grid-template-columns:38px 1fr 92px 1fr;column-gap:3px}
  .match-row .other-info{display:none}
  .bet-bar{padding:6px 4px 9px;gap:6px 8px}
  .bet-ctrl{gap:3px}
  .bet-ctrl .stake{width:48px}
  .bet-ctrl button{padding:3px 6px;font-size:10.5px}
  .bet-bar .od{padding:2px 6px;font-size:10.5px}
  h1{gap:6px}
  h1 .ttl{font-size:19px;letter-spacing:1px}
  h1 .sub{display:none}
  h1 .jst{font-size:9.5px;padding:2px 8px}
  .tabs{gap:3px;padding:3px}
  .tabs button{flex:1 1 auto;padding:8px 6px;font-size:11.5px;letter-spacing:0;white-space:nowrap;text-align:center}
  .toolbar{gap:5px}
  .toolbar button{padding:7px 9px;font-size:0}      /* スマホはアイコンのみで1行に圧縮 */
  .toolbar button .ico{margin-right:0}
  #fetch-status{font-size:10px}
  .player-chip{padding:5px 9px;font-size:11.5px}
  /* スマホでは上部を固定しない（スクロールで送り出してブラケットを画面いっぱいに使える） */
  header{position:static;padding:10px 12px 0}
  .topbar{gap:6px}
  h1 .jst{display:none}
  .tabs{margin:8px 0 8px}
  #app .hint{font-size:10.5px;line-height:1.55;margin:4px 0 8px}
  .ko-bar{gap:6px;margin-bottom:8px}
  .zoom-ctrl{padding:3px}
  .zoom-ctrl button{min-width:30px;padding:4px 7px;font-size:12px}
  /* ブラケットの縦スクロールはページに連鎖（ヘッダーを送り出せる）／横ははみ出さない */
  .bracket-wrap{max-height:84vh;overscroll-behavior-x:contain;overscroll-behavior-y:auto}
  .group-card h3{font-size:14px}
  .champ-inner{gap:8px;padding:8px 10px}
  .champ-team{font-size:15px}
  footer{padding:14px 12px 20px}
}
@media(max-width:380px){
  .match-row{grid-template-columns:32px 1fr 88px 1fr;font-size:11.5px}
  h1 .ttl{font-size:16px;letter-spacing:.5px}
  .tabs button{padding:7px 5px;font-size:10.5px}
}
</style>
</head>
<body>
<header>
  <div class="topbar">
    <h1><span class="cup">🏆</span><span class="ttl">FIFA WORLD CUP 2026</span><span class="sub">PREDICT · BET · WIN</span><span class="jst">JST（日本時間）表示</span></h1>
    <div class="head-right">
      <button class="player-chip" id="player-chip" onclick="openSettings()" title="アカウント設定">
        <span class="dot" id="player-dot"></span><span id="player-name">あなた</span>
        <span class="coins" id="player-coins">🪙 1000</span>
      </button>
      <button id="mode-toggle" class="mode-toggle" onclick="toggleMode()" title="予想（メイン）と実際の結果を切り替え"></button>
    </div>
  </div>
  <div class="topbar">
    <nav class="tabs">
      <button id="tab-groups" onclick="setTab('groups')">GROUP STAGE</button>
      <button id="tab-ko" onclick="setTab('ko')">KNOCKOUTS</button>
      <button id="tab-cal" onclick="setTab('cal')">CALENDAR</button>
      <button id="tab-cmp" onclick="setTab('cmp')">SCORECARD</button>
      <button id="tab-league" onclick="setTab('league')">RIVALS<span class="live-dot" id="rivals-live"></span></button>
    </nav>
    <div class="toolbar">
      <button id="btn-random" onclick="randomFill()"><svg class="ico" viewBox="0 0 24 24"><path d="M12 3l1.7 4 4 1.7-4 1.7L12 14.4 10.3 10.4 6.3 8.7l4-1.7z"/><path d="M18.5 14l.9 2.1 2.1.9-2.1.9-.9 2.1-.9-2.1-2.1-.9 2.1-.9z"/></svg>未入力の予想をランダムで埋める</button>
      <button onclick="fetchResults(true)"><svg class="ico" viewBox="0 0 24 24"><path d="M21 12a9 9 0 1 1-2.64-6.36M21 3.5v5h-5"/></svg>結果を自動取得</button>
      <button onclick="resetTrack('pred')"><svg class="ico" viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 2.64-6.36M3 3.5v5h5"/></svg>予想をリセット</button>
      <button class="minor" onclick="exportData()" title="バックアップを保存(JSON)" aria-label="保存"><svg class="ico" viewBox="0 0 24 24"><path d="M12 3v11M7.5 9.5 12 14l4.5-4.5M5 20h14"/></svg></button>
      <button class="minor" onclick="document.getElementById('import-file').click()" title="バックアップを読込" aria-label="読込"><svg class="ico" viewBox="0 0 24 24"><path d="M12 14V3M7.5 7.5 12 3l4.5 4.5M5 20h14"/></svg></button>
      <input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(this)">
      <span id="fetch-status"></span>
    </div>
  </div>
  <div class="next-match" id="next-match"></div>
</header>
<div id="warn-banner"></div>
<div id="champ-ribbon"></div>
<div class="modebanner" id="modebanner"></div>
<main id="app"></main>
<div id="settings-modal" class="modal" style="display:none" onclick="if(event.target===this)closeSettings()">
  <div class="modal-panel" id="settings-panel"></div>
</div>
<input type="file" id="avatar-file" accept="image/*,.heic,.heif" style="display:none" onchange="uploadAvatar(this)">
<footer>🕐 日時表記はすべて<b>日本時間(JST)</b>に変換済みです（現地とは日付が異なる場合があります）。試合結果はESPN公開データから自動取得・自動反映されます（画面表示時＋「結果を自動取得」ボタン。手入力は不要）。順位決定は 勝点→得失点差→総得点→当該チーム間の成績 を適用（フェアプレーポイント・抽選は未対応）。3位通過8チームの山への振り分けは規定の条件を満たす割り当てを自動探索する簡易方式。予想はこのブラウザ(localStorage)に自動保存されます。</footer>

/* ============ 計算エンジン ============ */
let memo = {};
function clearMemo(){ memo = {}; }

function groupMatchesOf(g){ return DATA.groupMatches.filter(m=>m.group===g); }
function matchEntry(track,n){
  // o: 'h'|'d'|'a'（勝敗）/ h,a: スコア。予想トラックは勝敗のみでも有効、スコアは任意。
  const s = state[track].group[n] || {};
  const h = Number.isInteger(s.h) ? s.h : null;
  const a = Number.isInteger(s.a) ? s.a : null;
  let o = null;
  if(h!==null && a!==null) o = h>a ? "h" : (h<a ? "a" : "d");
  else if(track==="pred" && s.o) o = s.o;
  return {o,h,a};
}
function getGroupScore(track,n){
  const e = matchEntry(track,n);
  return (e.h!==null && e.a!==null) ? e : null;
}
function groupComplete(track,g){
  return groupMatchesOf(g).every(m=>matchEntry(track,m.n).o);
}
function standings(track,g){
  const key = "st_"+track+"_"+g;
  if(memo[key]) return memo[key];
  const rows = DATA.groups[g].map(id=>({id, pts:0, played:0, gf:0, ga:0, gd:0}));
  const byId = {}; rows.forEach(r=>byId[r.id]=r);
  for(const m of groupMatchesOf(g)){
    const e = matchEntry(track,m.n); if(!e.o) continue;
    const h=byId[m.home], a=byId[m.away];
    h.played++; a.played++;
    if(e.h!==null && e.a!==null){ h.gf+=e.h; h.ga+=e.a; a.gf+=e.a; a.ga+=e.h; }
    if(e.o==="h") h.pts+=3; else if(e.o==="a") a.pts+=3; else {h.pts++; a.pts++;}
  }
  rows.forEach(r=>r.gd=r.gf-r.ga);
  const cmp = (x,y)=> y.pts-x.pts || y.gd-x.gd || y.gf-x.gf;
  rows.sort(cmp);
  // 同成績クラスタは当該チーム間成績で再ソート
  let i=0;
  while(i<rows.length){
    let j=i+1;
    while(j<rows.length && cmp(rows[i],rows[j])===0) j++;
    if(j-i>1){
      const sub = rows.slice(i,j);
      const ids = new Set(sub.map(t=>t.id));
      const mini = {}; sub.forEach(t=>mini[t.id]={pts:0,gf:0,ga:0});
      for(const m of groupMatchesOf(g)){
        if(!ids.has(m.home)||!ids.has(m.away)) continue;
        const e = matchEntry(track,m.n); if(!e.o) continue;
        if(e.h!==null && e.a!==null){
          mini[m.home].gf+=e.h; mini[m.home].ga+=e.a;
          mini[m.away].gf+=e.a; mini[m.away].ga+=e.h;
        }
        if(e.o==="h") mini[m.home].pts+=3; else if(e.o==="a") mini[m.away].pts+=3; else {mini[m.home].pts++; mini[m.away].pts++;}
      }
      sub.sort((x,y)=>{
        const mx=mini[x.id], my=mini[y.id];
        return my.pts-mx.pts || (my.gf-my.ga)-(mx.gf-mx.ga) || my.gf-mx.gf || String(x.id).localeCompare(String(y.id));
      });
      rows.splice(i, j-i, ...sub);
    }
    i=j;
  }
  memo[key]=rows;
  return rows;
}
function allGroupsComplete(track){
  return Object.keys(DATA.groups).every(g=>groupComplete(track,g));
}
function thirdRanking(track){
  // 各グループ3位チームのランキング（入力途中でも暫定で返す。1試合も入力のない3位チームは除外）
  const key="tr_"+track;
  if(key in memo) return memo[key];
  const list = Object.keys(DATA.groups).map(g=>{
    const t = standings(track,g)[2];
    return {group:g, id:t.id, pts:t.pts, gd:t.gd, gf:t.gf, played:t.played};
  }).filter(t=>t.played>0);
  list.sort((x,y)=> y.pts-x.pts || y.gd-x.gd || y.gf-x.gf || String(x.id).localeCompare(String(y.id)));
  memo[key]=list;
  return list;
}
function assignThirds(track){
  // トーナメントへの実際の割り当ては全グループ確定後のみ
  const key="at_"+track;
  if(key in memo) return memo[key];
  if(!allGroupsComplete(track)){ memo[key]=null; return null; }
  const ranking = thirdRanking(track);
  const qual = ranking.slice(0,8).map(x=>x.group);
  const slots = DATA.r32
    .map(m=>{
      const src = String(m.home).startsWith("3-") ? m.home : (String(m.away).startsWith("3-") ? m.away : null);
      return src ? {n:m.n, allowed:String(src).slice(2).split("")} : null;
    })
    .filter(Boolean)
    .sort((a,b)=>a.allowed.length-b.allowed.length);
  const assign = {}; const used = new Set();
  function bt(k){
    if(k===slots.length) return true;
    const s = slots[k];
    for(const g of qual){
      if(used.has(g) || !s.allowed.includes(g)) continue;
      used.add(g); assign[s.n]=g;
      if(bt(k+1)) return true;
      used.delete(g); delete assign[s.n];
    }
    return false;
  }
  const ok = bt(0);
  memo[key] = ok ? assign : null;
  return memo[key];
}
function slotTeam(track,m,side){
  const src = String(m[side]);
  if(src.startsWith("W-")){ const g=src.slice(2); return groupComplete(track,g)?standings(track,g)[0].id:null; }
  if(src.startsWith("RU-")){ const g=src.slice(3); return groupComplete(track,g)?standings(track,g)[1].id:null; }
  if(src.startsWith("3-")){
    const a = assignThirds(track); if(!a) return null;
    const g = a[m.n]; return g ? standings(track,g)[2].id : null;
  }
  if(/^W\d+$/.test(src)) return koWinner(track, +src.slice(1));
  if(/^L\d+$/.test(src)) return koLoser(track, +src.slice(1));
  return null;
}
function koWinner(track,n){
  const m = DATA.koByN[n]; if(!m) return null;
  const home = slotTeam(track,m,"home"), away = slotTeam(track,m,"away");
  if(track==="pred"){
    const pick = state.pred.ko[n];
    if(pick==="home") return home;
    if(pick==="away") return away;
    return null;
  }
  const r = state.actual.ko[n];
  if(!r || !Number.isInteger(r.h) || !Number.isInteger(r.a)) return null;
  if(r.h>r.a) return home;
  if(r.a>r.h) return away;
  if(r.pk==="home") return home;
  if(r.pk==="away") return away;
  return null;
}
function koLoser(track,n){
  const m = DATA.koByN[n]; if(!m) return null;
  const home = slotTeam(track,m,"home"), away = slotTeam(track,m,"away");
  if(track==="pred"){
    const pick = state.pred.ko[n];
    if(pick==="home") return away;
    if(pick==="away") return home;
    return null;
  }
  const r = state.actual.ko[n];
  if(!r || !Number.isInteger(r.h) || !Number.isInteger(r.a)) return null;
  if(r.h>r.a) return away;
  if(r.a>r.h) return home;
  if(r.pk==="home") return away;
  if(r.pk==="away") return home;
  return null;
}
function slotLabelHTML(track,m,side){
  const id = slotTeam(track,m,side);
  if(id) return `<span class="nm">${teamHTML(id)}</span>`;
  const src = String(m[side]);
  let label = "未定";
  if(src.startsWith("W-")) label = `${src.slice(2)}組 1位`;
  else if(src.startsWith("RU-")) label = `${src.slice(3)}組 2位`;
  else if(src.startsWith("3-")) label = `3位 (${src.slice(2).split("").join("/")})`;
  else if(/^W\d+$/.test(src)) label = `第${src.slice(1)}試合の勝者`;
  else if(/^L\d+$/.test(src)) label = `第${src.slice(1)}試合の敗者`;
  return `<span class="nm">${label}</span>`;
}

const _reduceMotion = !!(window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches);
let _fxCanvas=null, _fxCtx=null, _fxParts=[], _fxRAF=null, _lastPointer={x:innerWidth/2, y:130};
document.addEventListener("pointerdown", e=>{ _lastPointer={x:e.clientX, y:e.clientY}; }, true);
function _fxEnsure(){
  if(_fxCanvas) return;
  _fxCanvas=document.createElement("canvas"); _fxCanvas.id="fx-canvas";
  document.body.appendChild(_fxCanvas); _fxCtx=_fxCanvas.getContext("2d");
  _fxResize(); addEventListener("resize", _fxResize);
}
function _fxResize(){ if(_fxCanvas){ _fxCanvas.width=innerWidth; _fxCanvas.height=innerHeight; } }
function _fxTick(){
  const ctx=_fxCtx, c=_fxCanvas;
  ctx.clearRect(0,0,c.width,c.height);
  for(const p of _fxParts){
    p.life++; p.vy+=p.g; p.vx*=0.99; p.x+=p.vx; p.y+=p.vy; p.rot+=p.vr;
    const a=Math.max(0,1-p.life/p.max);
    ctx.save(); ctx.globalAlpha=a; ctx.translate(p.x,p.y); ctx.rotate(p.rot);
    if(p.coin){ ctx.font=p.size+"px serif"; ctx.textAlign="center"; ctx.textBaseline="middle"; ctx.fillText("🪙",0,0); }
    else { ctx.fillStyle=p.color;
      if(p.shape) ctx.fillRect(-p.size/2,-p.size/2,p.size,p.size*0.62);
      else { ctx.beginPath(); ctx.arc(0,0,p.size/2,0,7); ctx.fill(); } }
    ctx.restore();
  }
  _fxParts=_fxParts.filter(p=>p.life<p.max && p.y<c.height+60);
  if(_fxParts.length) _fxRAF=requestAnimationFrame(_fxTick);
  else { ctx.clearRect(0,0,c.width,c.height); _fxRAF=null; }
}
const _FX_COLORS=["#ffd166","#1ee78e","#4dabff","#ff5d7a","#ff9f43","#fff3c4","#b388ff"];
function confetti(x,y,count,power,coin){
  if(_reduceMotion) return;
  _fxEnsure();
  for(let i=0;i<count;i++){
    const ang=Math.random()*Math.PI*2, sp=(Math.random()*0.6+0.4)*(power||9);
    _fxParts.push({ x,y, vx:Math.cos(ang)*sp, vy:Math.sin(ang)*sp-(coin?5:4), g:coin?0.3:0.22,
      size:coin?(Math.random()*8+12):(Math.random()*5+3),
      color:_FX_COLORS[(Math.random()*_FX_COLORS.length)|0],
      rot:Math.random()*6, vr:(Math.random()-0.5)*0.3,
      life:0, max:(coin?50:70)+Math.random()*30, shape:Math.random()<0.55, coin:!!coin });
  }
  if(!_fxRAF) _fxRAF=requestAnimationFrame(_fxTick);
}

const LOCK_GRACE_MS = 10*60*1000;   // キックオフ後10分まで予想・ベット変更を許可
function matchLocked(n){
  const k = KICKOFF[n];
  return k ? (Date.now() >= new Date(k).getTime() + LOCK_GRACE_MS) : false;
}
function setBet(kind, n, val){
  if(ui.mode!=="pred") return;
  const avail = tallyCoins(meSnapshot()).available;
  let v = val==="" ? 0 : Math.max(0, Math.floor(Number(val)||0));
  // 既存の賭けを戻した上限＝available+現在の賭け
  const cur = (state.bets[kind][n] && state.bets[kind][n].stake) || 0;
  const cap = avail + cur;
  if(v>cap) v = cap;
  applyBet(kind, n, v);
}
function quickBet(kind, n, amt){
  if(ui.mode!=="pred") return;
  const t = tallyCoins(meSnapshot());
  const cur = (state.bets[kind][n] && state.bets[kind][n].stake) || 0;
  let v;
  if(amt==="all") v = cur + t.available;
  else v = cur + amt;
  const cap = cur + t.available;
  if(v>cap) v = cap;
  applyBet(kind, n, v);
}
function applyBet(kind, n, stake){
  if(matchLocked(n)){ render(); return; }   // キックオフ後は賭けの変更不可
  const prevStake = (state.bets[kind][n] && state.bets[kind][n].stake) || 0;
  if(stake>0){
    state.bets[kind][n] = {stake};
    // KOは賭けた時点の選択サイドを保存（後で予想変更しても賭けは選択サイドに固定）
    if(kind==="ko"){
      const side = state.pred.ko[n];
      if(!side){ delete state.bets[kind][n]; }       // 勝者未選択なら賭け不可
      else state.bets[kind][n].side = side;
    }
  } else {
    delete state.bets[kind][n];
  }
  save(); render();
  if(stake>prevStake && state.bets[kind][n]) celebrateCoin();
}
function betBarGroup(m, e){
  const od = groupOddsFor(m.n);
  const bet = state.bets.group[m.n];
  const stake = bet ? bet.stake : 0;
  const act = actualGroupResult(m.n);
  const locked = matchLocked(m.n) || !!act;
  // 決着済み表示
  if(act && stake>0 && e.o){
    const win = e.o===act.o;
    const oddsVal = od ? od[e.o] : 2;
    const perfect = win && Number.isInteger(e.h)&&Number.isInteger(e.a)&&e.h===act.h&&e.a===act.a;
    let amt = win ? Math.round(stake*(oddsVal-1)) : 0;
    if(perfect) amt = amt*PERFECT_MULT;
    const delta = win ? `+${amt}` : `-${stake}`;
    const badge = perfect ? ` <span class="perfect-tag">⚡パーフェクト ×${PERFECT_MULT}</span>` : "";
    return `<div class="bet-bar settled ${win?"win":"lose"}">
      <span class="bet-res">${win?"🎯 的中":"💥 ハズレ"} <b>${delta} 🪙</b>（賭け ${stake} × ${oddsVal.toFixed(2)}）${badge}</span></div>`;
  }
  const oddsHTML = od ? `<span class="odds-set">
      <span class="od ${e.o==="h"?"on":""}">勝 ${od.h.toFixed(2)}</span>
      <span class="od ${e.o==="d"?"on":""}">分 ${od.d.toFixed(2)}</span>
      <span class="od ${e.o==="a"?"on":""}">負 ${od.a.toFixed(2)}</span></span>` : "";
  if(locked && stake>0){
    return `<div class="bet-bar locked">${oddsHTML}<span class="bet-note">🔒 賭け中 ${stake}🪙（キックオフ済み）</span></div>`;
  }
  if(!e.o){
    return `<div class="bet-bar">${oddsHTML}<span class="bet-note">勝敗を選ぶと賭けられます</span></div>`;
  }
  const oddsVal = od ? od[e.o] : 2;
  const base = stake>0 ? Math.round(stake*(oddsVal-1)) : 0;
  let payout = stake>0 ? `的中で <b class="gain">+${base}</b> 🪙` : "";
  if(stake>0 && Number.isInteger(e.h) && Number.isInteger(e.a)) payout += ` <span class="perfect-hint">⚡スコアも的中で +${base*PERFECT_MULT}🪙</span>`;
  return `<div class="bet-bar">${oddsHTML}
    <span class="bet-ctrl">🪙<input class="stake" type="number" min="0" value="${stake||""}" placeholder="0" onchange="setBet('group',${m.n},this.value)">
      <button onclick="quickBet('group',${m.n},10)">+10</button>
      <button onclick="quickBet('group',${m.n},50)">+50</button>
      <button onclick="quickBet('group',${m.n},100)">+100</button>
      <button class="allin" onclick="quickBet('group',${m.n},'all')">ALL</button>
      ${stake>0?`<button class="clr" onclick="setBet('group',${m.n},0)" title="取消">✕</button>`:""}
    </span><span class="payout">${payout}</span></div>`;
}

function loadHeic2any(){
  if(window.heic2any) return Promise.resolve(window.heic2any);
  return new Promise((res,rej)=>{
    const s=document.createElement("script");
    s.src="https://cdn.jsdelivr.net/npm/heic2any@0.0.4/dist/heic2any.min.js";
    s.onload=()=>res(window.heic2any); s.onerror=()=>rej(new Error("heic2any load failed"));
    document.head.appendChild(s);
  });
}
async function uploadAvatar(input){
  const f=input.files && input.files[0]; input.value="";
  if(!f) return;
  const isHeic = /heic|heif/i.test(f.type) || /\.(heic|heif)$/i.test(f.name||"");
  const looksImage = /^image\//.test(f.type) || isHeic || /\.(jpe?g|png|webp|gif|bmp)$/i.test(f.name||"");
  if(!looksImage){ alert("画像ファイルを選んでください。"); return; }
  let blob = f;
  if(isHeic){
    try{
      setFetchStatus("HEIC画像を変換中…","loading");
      const h2a=await loadHeic2any();
      blob=await h2a({blob:f, toType:"image/jpeg", quality:0.85});
      if(Array.isArray(blob)) blob=blob[0];
      setFetchStatus("","none");
    }catch(e){ console.warn("heic convert",e); setFetchStatus("","none"); /* iOSなら無変換でも通る場合があるので続行 */ }
  }
  const fr=new FileReader();
  fr.onload=()=>{
    const img=new Image();
    img.onload=()=>{
      const S=96, c=document.createElement("canvas"); c.width=S; c.height=S;
      const ctx=c.getContext("2d");
      const m=Math.min(img.width,img.height), sx=(img.width-m)/2, sy=(img.height-m)/2;
      ctx.drawImage(img, sx,sy,m,m, 0,0,S,S);
      let url; try{ url=c.toDataURL("image/jpeg",0.72); }catch(_){ alert("この画像は読み込めませんでした。"); return; }
      state.me.avatar=sanitizeAvatar(url); save(); render(); refreshSettings();
    };
    img.onerror=()=>alert("画像を読み込めませんでした。HEICの場合はJPEGに変換してからお試しください。");
    img.src=fr.result;
  };
  fr.readAsDataURL(blob);
}

/* ============ 結果の自動取得（ESPN公開API） ============ */
const norm = s => String(s).toLowerCase().normalize("NFD").replace(/[̀-ͯ]/g,"").replace(/[^a-z]/g,"");
const NAME_ALIAS = {"czechia":"czechrepublic","bosniaherzegovina":"bosniaandherzegovina","turkiye":"turkey","usa":"unitedstates","korearepublic":"southkorea","cotedivoire":"ivorycoast","caboverde":"capeverde","congodr":"drcongo","democraticrepublicofthecongo":"drcongo","iriran":"iran","republicofireland":"ireland"};
const cnorm = s => { const x = norm(s); return NAME_ALIAS[x] || x; };
const pairKey = (a,b) => [cnorm(a),cnorm(b)].sort().join("|");
const _STATUS_ICO={
  ok:'<svg class="sico ok" viewBox="0 0 24 24"><path d="M4 13l5 5L20 6"/></svg>',
  loading:'<svg class="sico spin" viewBox="0 0 24 24"><path d="M21 12a9 9 0 1 1-2.64-6.36M21 3.5v5h-5"/></svg>',
  warn:'<svg class="sico warn" viewBox="0 0 24 24"><path d="M12 3 2.5 20h19z"/><path d="M12 10v4.5M12 17.4v.1"/></svg>',
  none:''
};
function setFetchStatus(msg, type){ const el=document.getElementById("fetch-status"); if(el) el.innerHTML=(_STATUS_ICO[type]||"")+esc(msg||""); }
async function fetchResults(manual){
  setFetchStatus("結果を取得中…", "loading");
  try{
    const r = await fetch("https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?dates=20260611-20260719&limit=200");
    if(!r.ok) throw new Error("HTTP "+r.status);
    const j = await r.json();
    const done = (j.events||[]).filter(e=>e.status && e.status.type && e.status.type.completed);
    let applied = 0;
    // --- グループステージ: チームの組で照合 ---
    const fixByPair = {};
    DATA.groupMatches.forEach(m=>fixByPair[pairKey(m.home,m.away)] = m);
    const koEvents = [];
    for(const e of done){
      const comp = e.competitions[0].competitors;
      const fm = fixByPair[pairKey(comp[0].team.displayName, comp[1].team.displayName)];
      const near = fm && KICKOFF[fm.n] && Math.abs(new Date(e.date) - new Date(KICKOFF[fm.n])) < 48*3600*1000;
      if(fm && near){
        const hc = comp.find(t=>cnorm(t.team.displayName)===cnorm(fm.home));
        const ac = comp.find(t=>t!==hc);
        if(hc && ac){ state.actual.group[fm.n] = {h:+hc.score, a:+ac.score}; applied++; }
      } else koEvents.push(e);
    }
    // --- 決勝T: ラウンド順に、確定した対戦カードへ割り当て ---
    const roundsSeq = [DATA.r32, DATA.r16, DATA.qf, DATA.sf, [DATA.thirdPlace], [DATA.final]];
    for(const round of roundsSeq){
      clearMemo();
      for(const m of round){
        const h = slotTeam("actual",m,"home"), a = slotTeam("actual",m,"away");
        if(!h || !a) continue;
        const ours = [cnorm(h),cnorm(a)].sort().join("|");
        const ev = koEvents.find(e=>{
          const ns = e.competitions[0].competitors.map(t=>cnorm(t.team.displayName)).sort().join("|");
          return ns===ours && Math.abs(new Date(e.date) - new Date(KICKOFF[m.n])) < 48*3600*1000;
        });
        if(!ev) continue;
        const comp = ev.competitions[0].competitors;
        const hc = comp.find(t=>cnorm(t.team.displayName)===cnorm(h));
        const ac = comp.find(t=>t!==hc);
        const rec = {h:+hc.score, a:+ac.score, pk:null};
        if(rec.h===rec.a){
          const hs = +(hc.shootoutScore||0), as = +(ac.shootoutScore||0);
          if(hs!==as) rec.pk = hs>as ? "home" : "away";
        }
        state.actual.ko[m.n] = rec; applied++;
      }
    }
    save(); render();
    celebrateNewHits();   // 新たに的中した予想を祝福
    const t = new Intl.DateTimeFormat("ja-JP",{timeZone:"Asia/Tokyo",hour:"2-digit",minute:"2-digit"}).format(new Date());
    setFetchStatus(applied>0 ? `${applied}試合の結果を反映（${t} 確認）` : `終了済みの試合はまだありません（${t} 確認）`, "ok");
  }catch(err){
    setFetchStatus("自動取得に失敗（オフライン時は手入力できます）", "warn");
    if(manual) alert("結果の自動取得に失敗しました: " + err.message);
  }
}

function importData(input){
  const f = input.files[0]; if(!f) return;
  const fr = new FileReader();
  fr.onload = ()=>{
    try{
      const s = JSON.parse(fr.result);
      if(!s || typeof s!=="object" || !s.pred || !s.actual) throw new Error("形式が不正です");
      // 取り込みデータをホワイトリストで再構築（任意フィールド・不正値・汚染を遮断）
      const next = {
        pred: cleanPred(s.pred),
        bets: cleanBets(s.bets),
        actual: cleanActual(s.actual),
        me: {
          id: safeId(s.me&&s.me.id) || uid(),
          name: (s.me&&s.me.name) ? sanitizeName(s.me.name).slice(0,16) : "",
          color: safeColor(s.me&&s.me.color),
          avatar: sanitizeAvatar(s.me&&s.me.avatar)
        },
        room: {code:"", fb:null},   // 取り込みでオンライン接続は引き継がない（安全側）
        account: "",
        players: {},
        celebratedHits: Array.isArray(s.celebratedHits) ? s.celebratedHits.filter(Number.isInteger).slice(0,500) : []
      };
      if(s.players && typeof s.players==="object"){
        for(const k in s.players){ const c=cleanIncomingPlayer(s.players[k]); if(c) next.players[c.id]=c; }
      }
      state = next; ensureLeague(); save(); render();
      alert("読み込みました。");
    }catch(e){ alert("読み込みに失敗しました: "+e.message); }
  };
  fr.readAsText(f);
  input.value = "";
}

function judgeMatch(pred, act){
  // pred/act は matchEntry 形式 {o,h,a}。戻り値: exact / outcome / miss
  if(pred.h!==null && pred.a!==null && pred.h===act.h && pred.a===act.a) return "exact";
  return pred.o===act.o ? "outcome" : "miss";
}

function broadcastFor(m, ko){
  let home, away;
  if(ko){ home=slotTeam("actual",m,"home")||slotTeam("pred",m,"home"); away=slotTeam("actual",m,"away")||slotTeam("pred",m,"away"); }
  else { home=m.home; away=m.away; }
  const jp = home==="Japan"||away==="Japan";
  const list=[];
  if(jp){
    if((home==="Japan"&&away==="Tunisia")||(away==="Japan"&&home==="Tunisia")) list.push("日テレ");
    list.push("NHK");
  } else {
    const isFinal = ko && m.n===DATA.final.n, isThird = ko && m.n===DATA.thirdPlace.n;
    const isSemi = ko && DATA.sf.some(x=>x.n===m.n), isOpener = !ko && m.n===1;
    if(isOpener||isSemi||isFinal||isThird) list.push("NHK");
  }
  list.push("DAZN");
  return list;
}
const BROADCAST_CLS = {"NHK":"bc-nhk","日テレ":"bc-ntv","フジ":"bc-fuji","DAZN":"bc-dazn"};

  const todayKey=new Intl.DateTimeFormat("en-CA",{timeZone:"Asia/Tokyo",year:"numeric",month:"2-digit",day:"2-digit"}).format(new Date());
  let html='<div class="cal-grid-wrap">';
  for(const ym of months) html+=renderMonthGrid(ym, byDay, todayKey);
  html+='</div>';
  if(ui.calSelDate && byDay[ui.calSelDate]){
    html += `<div class="cal-list" style="margin-top:14px"><div class="day-header">${jstDayLabel(byDay[ui.calSelDate][0].m)} の試合</div>`;
    for(const {m,ko} of byDay[ui.calSelDate]) html+=calRowHTML(m,ko);
    html+='</div>';
  } else {
    html += '<p class="hint" style="margin-top:10px">📅 日付をタップすると、その日の試合と放送を表示します。</p>';
  }
  return html;
}
function renderMonthGrid(ym, byDay, todayKey){
  const [y,mo]=ym.split("-").map(Number);
  const first=new Date(Date.UTC(y,mo-1,1)).getUTCDay();
  const days=new Date(Date.UTC(y,mo,0)).getUTCDate();
  const wd=["日","月","火","水","木","金","土"];
  let html=`<div class="cal-month"><div class="cal-mtitle">${y}年 ${mo}月</div><div class="cal-grid">`;
  html+=wd.map((d,i)=>`<div class="cal-wd ${i===0?"sun":i===6?"sat":""}">${d}</div>`).join("");
  for(let i=0;i<first;i++) html+='<div class="cal-cell empty"></div>';
  for(let d=1;d<=days;d++){
    const key=`${ym}-${String(d).padStart(2,"0")}`;
    const ms=byDay[key]||[];
    const cls=["cal-cell"]; if(ms.length)cls.push("has"); if(key===todayKey)cls.push("today"); if(key===ui.calSelDate)cls.push("sel");
    let fx="";
    if(ms.length){
      fx='<div class="cal-fxs">'+ms.map(x=>{
        const m=x.m; let h,a;
        if(x.ko){ h=slotTeam("actual",m,"home"); a=slotTeam("actual",m,"away"); }  // 実結果で確定したカードのみ
        else { h=m.home; a=m.away; }
        // KOで対戦カード未確定はラウンド名を表示（確定したら国旗に自動反映）
        if(x.ko && !(h&&a)){
          return `<span class="cal-rd" title="${koRoundLabel(m)}（対戦カード未定）">${koRoundLabel(m)}</span>`;
        }
        const isJp = h==="Japan"||a==="Japan";
        return `<span class="cal-fx${isJp?" jp":""}" title="${esc(teamJa(h))} vs ${esc(teamJa(a))}">${teamFlag(h)}<span class="cal-x">v</span>${teamFlag(a)}</span>`;
      }).join("")+'</div>';
    }
    const onclick = ms.length?` onclick="selectCalDay('${key}')"`:"";
    html+=`<div class="${cls.join(" ")}"${onclick}><span class="cal-d">${d}</span>${fx}</div>`;
  }
  html+='</div></div>';
  return html;
}

function koCard(m, track){
  const home = slotTeam(track,m,"home"), away = slotTeam(track,m,"away");
  const winner = koWinner(track, m.n);
  const r = state.actual.ko[m.n] || {};
  const pick = state.pred.ko[m.n];
  let rows = "";
  for(const side of ["home","away"]){
    const id = side==="home" ? home : away;
    let cls = "ko-team" + (id ? "" : " placeholder");
    let sc = "";
    if(track==="pred"){
      cls += " clickable";
      if(pick===side) cls += " picked";
    } else {
      const v = side==="home" ? r.h : r.a;
      if(Number.isInteger(v)) sc = v;
      if(winner && id){
        cls += (winner===id) ? " won" : " lost";
      }
    }
    const onclick = track==="pred" ? ` onclick="pickKo(${m.n},'${side}')"` : "";
    rows += `<div class="${cls}"${onclick}>${slotLabelHTML(track,m,side)}<span class="sc">${sc}</span></div>`;
  }
  let res = "";
  if(track==="actual" && r.pk){
    res = `<div class="ko-res"><span class="pk">⚽ PK戦勝利: ${winner ? teamJa(winner) : ""}</span></div>`;
  }
  const bet = track==="pred" ? betBarKo(m, home, away, pick) : "";
  const title = m.title ? `<b>${m.title}</b>` : `第${m.n}試合`;
  return `<div class="ko-card" data-n="${m.n}"><div class="meta"><span>${title}</span><span>${fmtJST(m)} ${cityJa(m.city)}</span></div>${rows}${res}${bet}</div>`;
}
function betBarKo(m, home, away, pick){
  const od = matchOdds(home, away, true);
  const bet = state.bets.ko[m.n];
  const stake = bet ? bet.stake : 0;
  const winnerActual = koWinner("actual", m.n);
  const locked = matchLocked(m.n) || !!winnerActual;
  // 決着済み
  if(winnerActual && stake>0 && bet.side){
    const pickedId = bet.side==="home" ? home : away;
    const win = pickedId && winnerActual===pickedId;
    const oddsVal = od ? od[bet.side==="home"?"h":"a"] : 2;
    const delta = win ? `+${Math.round(stake*(oddsVal-1))}` : `-${stake}`;
    return `<div class="bet-bar ko settled ${win?"win":"lose"}"><span class="bet-res">${win?"🎯 的中":"💥 ハズレ"} <b>${delta}🪙</b></span></div>`;
  }
  if(!home || !away){
    return `<div class="bet-bar ko"><span class="bet-note">対戦カード確定後に賭けられます</span></div>`;
  }
  const oddsHTML = od ? `<span class="odds-set"><span class="od ${pick==="home"?"on":""}">${teamJa(home)} ${od.h.toFixed(2)}</span><span class="od ${pick==="away"?"on":""}">${teamJa(away)} ${od.a.toFixed(2)}</span></span>` : "";
  if(locked && stake>0){
    return `<div class="bet-bar ko locked">${oddsHTML}<span class="bet-note">🔒 賭け中 ${stake}🪙</span></div>`;
  }
  if(!pick){
    return `<div class="bet-bar ko">${oddsHTML}<span class="bet-note">勝者を選ぶと賭けられます</span></div>`;
  }
  const oddsVal = od ? od[pick==="home"?"h":"a"] : 2;
  const payout = stake>0 ? `的中で <b class="gain">+${Math.round(stake*(oddsVal-1))}</b>🪙` : "";
  return `<div class="bet-bar ko">${oddsHTML}<span class="bet-ctrl">🪙<input class="stake" type="number" min="0" value="${stake||""}" placeholder="0" onchange="setBet('ko',${m.n},this.value)">
    <button onclick="quickBet('ko',${m.n},10)">+10</button>
    <button onclick="quickBet('ko',${m.n},50)">+50</button>
    <button onclick="quickBet('ko',${m.n},100)">+100</button>
    <button class="allin" onclick="quickBet('ko',${m.n},'all')">ALL</button>
    ${stake>0?`<button class="clr" onclick="setBet('ko',${m.n},0)" title="取消">✕</button>`:""}
    </span><span class="payout">${payout}</span></div>`;
}

const KO_POINTS = [
  {key:"r16", label:"ラウンド16進出", pts:1},
  {key:"qf",  label:"準々決勝進出", pts:2},
  {key:"sf",  label:"準決勝進出", pts:3},
  {key:"final", label:"決勝進出", pts:4},
  {key:"champ", label:"優勝", pts:6}
];
function reachers(track, key){
  // そのラウンドに「進出した」チーム集合
  let ms;
  if(key==="r16") ms = DATA.r16;
  else if(key==="qf") ms = DATA.qf;
  else if(key==="sf") ms = DATA.sf;
  else if(key==="final") ms = [DATA.final];
  else { const c = koWinner(track, DATA.final.n); return c ? new Set([c]) : new Set(); }
  const set = new Set();
  for(const m of ms){
    const h = slotTeam(track,m,"home"), a = slotTeam(track,m,"away");
    if(h) set.add(h); if(a) set.add(a);
  }
  return set;
}

function renderCmp(){
  // グループステージ採点
  let exact=0, outcome=0, judged=0, gPts=0;
  let rowsHtml = "";
  const played = DATA.groupMatches.filter(m=>getGroupScore("actual",m.n));
  for(const m of played){
    const act = getGroupScore("actual",m.n);
    const pred = matchEntry("pred",m.n);
    let j="", jp=0;
    if(pred.o){
      const res = judgeMatch(pred, act);
      judged++;
      if(res==="exact"){exact++; jp=3;}
      else if(res==="outcome"){outcome++; jp=1;}
      gPts += jp;
      j = JUDGE_ICON[res] + (jp?` +${jp}`:"");
    } else j = '<span style="color:var(--sub)">予想なし</span>';
    // この試合のコイン損益
    let coinCell = '<span style="color:var(--sub)">—</span>';
    const b = state.bets.group[m.n];
    if(b && b.stake>0 && pred.o){
      const od = groupOddsFor(m.n); const ov = od?od[pred.o]:2;
      if(pred.o===act.o){
        const perfect = Number.isInteger(pred.h)&&Number.isInteger(pred.a)&&pred.h===act.h&&pred.a===act.a;
        let w = Math.round(b.stake*(ov-1)); if(perfect) w*=PERFECT_MULT;
        coinCell = `<span class="coin-up">+${w}🪙</span>${perfect?' <span class="perfect-tag">⚡×2</span>':''}`;
      } else coinCell = `<span class="coin-dn">-${b.stake}🪙</span>`;
    }
    rowsHtml += `<tr><td>${fmtJST(m)}</td><td>${m.group}</td><td>${teamHTML(m.home)} vs ${teamHTML(m.away)}</td><td>${pred.o?outcomeText(m,pred):"—"}</td><td><b>${act.h}-${act.a}</b></td><td>${j}</td><td>${coinCell}</td></tr>`;
  }
  // 決勝T採点
  let koPts=0, koHtml="";
  for(const r of KO_POINTS){
    const actSet = reachers("actual", r.key);
    if(actSet.size===0) continue;
    const predSet = reachers("pred", r.key);
    let chips="";
    for(const id of actSet){
      const hit = predSet.has(id);
      if(hit) koPts += r.pts;
      chips += `<span class="chip ${hit?"hit":""}">${teamHTML(id)}</span>`;
    }
    koHtml += `<div class="ko-cmp-round"><div class="rt">${r.label}（的中 +${r.pts}点/チーム）</div><div class="chips">${chips}</div></div>`;
  }
  const total = gPts + koPts;
  const tc = tallyCoins(meSnapshot());
  const net = tc.balance - START_COINS;
  const netCls = net>0?"coin-up":(net<0?"coin-dn":"");
  let html = `<div class="cmp-cards">
    <div class="cmp-card"><div class="v">🪙 ${tc.balance}</div><div class="l">コイン残高　収支 <span class="${netCls}">${net>0?"+":""}${net}</span>${tc.locked>0?`（賭け中 ${tc.locked}）`:""}</div></div>
    <div class="cmp-card"><div class="v">${total}点</div><div class="l">予想スコア合計</div></div>
    <div class="cmp-card"><div class="v">${gPts}点</div><div class="l">グループ（的中+1 / スコア完全+3）</div></div>
    <div class="cmp-card"><div class="v">${exact}◎ ${outcome}○</div><div class="l">的中数（判定済み ${judged}試合 / 決勝T ${koPts}点）</div></div>
  </div>`;
  if(played.length===0){
    html += '<div class="empty-note">まだ終了した試合がありません。<br>試合が終わると結果が自動で取り込まれ、ここで予想との答え合わせができます。</div>';
    return html;
  }
  if(koHtml) html += `<div class="cmp-section"><h3>決勝トーナメント 答え合わせ</h3>${koHtml}</div>`;
  html += `<div class="cmp-section"><h3>グループステージ 答え合わせ（結果入力済みの試合）</h3>
    <table class="cmp"><tr><th>日付</th><th>組</th><th>カード</th><th>予想</th><th>結果</th><th>判定</th><th>獲得</th></tr>${rowsHtml}</table></div>`;
  return html;
}
