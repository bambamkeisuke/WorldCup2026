function pickColor(){
  const used = new Set([state.me.color, ...Object.values(state.players).map(p=>p.color)]);
  return PLAYER_COLORS.find(c=>!used.has(c)) || PLAYER_COLORS[Object.keys(state.players).length % PLAYER_COLORS.length];
}
// 決着済みベットを時系列で取得（連勝判定・称号用）
function settledBets(player){
  const pred = player.pred||{group:{},ko:{}}, bets = player.bets||{group:{},ko:{}};
  const out=[];
  for(const m of DATA.groupMatches){
    const b=bets.group&&bets.group[m.n]; if(!b||!(b.stake>0))continue;
    const pe=predEntry(pred,"group",m.n); if(!pe.o)continue;
    const act=actualGroupResult(m.n); if(!act)continue;
    const od=groupOddsFor(m.n); const ov=od?od[pe.o]:2;
    out.push({t:KICKOFF[m.n]?new Date(KICKOFF[m.n]).getTime():0, stake:b.stake, win:act.o===pe.o, odds:ov});
  }
  for(const m of DATA.allKO){
    const b=bets.ko&&bets.ko[m.n]; if(!b||!(b.stake>0)||!b.side)continue;
    const w=koWinner("actual",m.n); if(!w)continue;
    const h=koSlotTeamFrom(pred,m,"home"), a=koSlotTeamFrom(pred,m,"away");
    const picked=b.side==="home"?h:a; const od=matchOdds(h,a,true); const ov=od?od[b.side==="home"?"h":"a"]:2;
    out.push({t:KICKOFF[m.n]?new Date(KICKOFF[m.n]).getTime():0, stake:b.stake, win:!!picked&&w===picked, odds:ov});
  }
  out.sort((x,y)=>x.t-y.t);
  return out;
}
function maxStakeOf(player){
  const bets=player.bets||{group:{},ko:{}}; let mx=0;
  for(const k of ["group","ko"]) for(const n in bets[k]){ const s=bets[k][n].stake||0; if(s>mx)mx=s; }
  return mx;
}
function playerStats(player){
  const c = tallyCoins(player);
  const s = tallyScore(player);
  const hist = settledBets(player);
  let cur=0, best=0; for(const r of hist){ if(r.win){cur++; if(cur>best)best=cur;} else cur=0; }
  const winOdds = hist.filter(r=>r.win).map(r=>r.odds);
  const bestWinOdds = winOdds.length?Math.max(...winOdds):0;
  return {...c, score:s, settledCount:hist.length, curStreak:cur, bestStreak:best,
          bestWinOdds, maxStake:maxStakeOf(player)};
}
function badgesFor(st){
  const b=[];
  if(st.curStreak>=2) b.push({t:`🔥 ${st.curStreak}連勝中`});
  if(st.bestWinOdds>=4) b.push({t:`💎 大穴ハンター ×${st.bestWinOdds.toFixed(1)}`});
  if(st.perfectHits>=1) b.push({t:`⚡ パーフェクト予言者${st.perfectHits>=2?" ×"+st.perfectHits:""}`});
  if(st.settledCount>=5 && st.hitRate>=0.65) b.push({t:`🛡️ 堅実派 ${Math.round(st.hitRate*100)}%`});
  if(st.maxStake>=300) b.push({t:`🎲 ハイローラー`});
  if(st.balance>=START_COINS*1.5) b.push({t:`📈 億り人`});
  if(st.balance<=0) b.push({t:`💀 一文無し`, s:true});
  if(st.betsPlaced===0) b.push({t:`🤝 様子見`, s:true});
  return b;
}

function fairOdds(p){ return Math.max(1.05, Math.round((1/Math.max(p,0.02))*100)/100); }
// 両チーム確定時のみ {h,d,a}（KOは{h,a}）。引き分けは接戦ほど確率高め。
function matchOdds(homeId, awayId, isKO){
  if(!homeId || !awayId) return null;
  const dr = ratingOf(homeId) - ratingOf(awayId);
  const pH = 1/(1+Math.pow(10, -dr/42));
  if(isKO) return {h:fairOdds(pH), a:fairOdds(1-pH)};
  const draw = Math.max(0.14, 0.30 - Math.abs(dr)/280);
  const ph = pH*(1-draw), pa = (1-pH)*(1-draw);
  return {h:fairOdds(ph), d:fairOdds(draw), a:fairOdds(pa)};
}
function groupOddsFor(n){
  const m = DATA.groupMatches.find(x=>x.n===n);
  return m ? matchOdds(m.home, m.away, false) : null;
}
function koOddsFor(track, m){
  const h = slotTeam(track,m,"home"), a = slotTeam(track,m,"away");
  return matchOdds(h, a, true);
}

/* ============ コイン損益の集計 ============ */
// player = {pred,bets}（自分も友達も同形）。実際の結果に対する損益を算出。
function tallyCoins(player){
  let balance = START_COINS, locked = 0, settledWin=0, settledLose=0, betsPlaced=0, hits=0, perfectHits=0;
  let biggestWin = 0, bestOdds = 0;
  const pred = player.pred || {group:{},ko:{}};
  const bets = player.bets || {group:{},ko:{}};
  // グループステージ
  for(const m of DATA.groupMatches){
    const b = bets.group && bets.group[m.n];
    if(!b || !(b.stake>0)) continue;
    const pe = predEntry(pred, "group", m.n);
    if(!pe || !pe.o) continue;
    betsPlaced++;
    const od = groupOddsFor(m.n);
    const oddsVal = od ? od[pe.o] : 2;
    const act = actualGroupResult(m.n);
    if(!act){ locked += b.stake; continue; }   // 未確定→ロック中
    if(act.o === pe.o){
      let win = Math.round(b.stake*(oddsVal-1));
      // パーフェクトボーナス：スコアまで的中なら配当を倍に
      const perfect = Number.isInteger(pe.h)&&Number.isInteger(pe.a)&&pe.h===act.h&&pe.a===act.a;
      if(perfect){ win = win*PERFECT_MULT; perfectHits++; }
      balance += win; settledWin += win; hits++;
      if(win>biggestWin){ biggestWin=win; }
      if(oddsVal>bestOdds) bestOdds=oddsVal;
    } else { balance -= b.stake; settledLose += b.stake; }
  }
  // 決勝トーナメント
  for(const m of DATA.allKO){
    const b = bets.ko && bets.ko[m.n];
    if(!b || !(b.stake>0) || !b.side) continue;
    betsPlaced++;
    const h = koSlotTeamFrom(pred, m, "home"), a = koSlotTeamFrom(pred, m, "away");
    const pickedId = b.side==="home" ? h : a;
    const od = matchOdds(h, a, true);
    const oddsVal = od ? od[b.side==="home"?"h":"a"] : 2;
    const winnerActual = koWinner("actual", m.n);
    if(!winnerActual){ locked += b.stake; continue; }
    if(pickedId && winnerActual===pickedId){
      const win = Math.round(b.stake*(oddsVal-1));
      balance += win; settledWin += win; hits++;
      if(win>biggestWin) biggestWin=win;
      if(oddsVal>bestOdds) bestOdds=oddsVal;
    } else { balance -= b.stake; settledLose += b.stake; }
  }
  const settled = betsPlaced - countPending(player);
  return {balance, locked, available:balance-locked, settledWin, settledLose,
          betsPlaced, hits, hitRate: settled>0?hits/settled:0, biggestWin, bestOdds, perfectHits};
}
function countPending(player){
  const bets = player.bets || {group:{},ko:{}};
  const pred = player.pred || {group:{},ko:{}};
  let pend=0;
  for(const m of DATA.groupMatches){
    const b = bets.group && bets.group[m.n];
    if(b && b.stake>0 && predEntry(pred,"group",m.n).o && !actualGroupResult(m.n)) pend++;
  }
  for(const m of DATA.allKO){
    const b = bets.ko && bets.ko[m.n];
    if(b && b.stake>0 && b.side && !koWinner("actual", m.n)) pend++;
  }
  return pend;
}
// 任意のpredオブジェクトから勝敗を読む（matchEntryのpred汎用版）
function predEntry(pred, kind, n){
  const s = (pred[kind]||{})[n] || {};
  const h = Number.isInteger(s.h)?s.h:null, a = Number.isInteger(s.a)?s.a:null;
  let o = null;
  if(h!==null && a!==null) o = h>a?"h":(h<a?"a":"d");
  else if(s.o) o = s.o;
  return {o,h,a};
}
function actualGroupResult(n){
  const s = state.actual.group[n];
  if(!s || !Number.isInteger(s.h) || !Number.isInteger(s.a)) return null;
  return {h:s.h, a:s.a, o: s.h>s.a?"h":(s.h<s.a?"a":"d")};
}

/* ============ 任意プレイヤー視点での計算（エンジン一時差し替え） ============ */
function withPred(predObj, fn){
  const saved = state.pred;
  state.pred = predObj || {group:{},ko:{}};
  clearMemo();
  try{ return fn(); } finally { state.pred = saved; clearMemo(); }
}

// 予想得点（既存renderCmpの採点を関数化）
function tallyScore(player){
  return withPred(player.pred, ()=>{
    let gPts=0, exact=0, outcome=0;
    for(const m of DATA.groupMatches){
      const act = getGroupScore("actual",m.n);
      if(!act) continue;
      const pe = matchEntry("pred", m.n);
      if(!pe.o) continue;
      const res = judgeMatch(pe, act);
      if(res==="exact"){exact++; gPts+=3;}
      else if(res==="outcome"){outcome++; gPts+=1;}
    }
    let koPts=0;
    for(const r of KO_POINTS){
      const actSet = reachers("actual", r.key);
      if(actSet.size===0) continue;
      const predSet = reachers("pred", r.key);
      for(const id of actSet) if(predSet.has(id)) koPts+=r.pts;
    }
    return {gPts, koPts, total:gPts+koPts, exact, outcome};
  });
}

  while(svg.firstChild) svg.removeChild(svg.firstChild);

  bracket.querySelectorAll(".ko-card[data-n]").forEach(c=>cards[c.getAttribute("data-n")]=c);
  const br=bracket.getBoundingClientRect();
  const z = bracket.offsetWidth ? (br.width/bracket.offsetWidth) : 1;   // 現在の拡大率を補正
  const at=(el,right)=>{ const r=el.getBoundingClientRect();
    return {x:((right?r.right:r.left)-br.left)/z, y:(r.top+r.height/2-br.top)/z}; };
  const ns="http://www.w3.org/2000/svg"; let i=0;
  for(const n in cards){

    for(const side of ["home","away"]){
      const mt=String(m[side]).match(/^[WL](\d+)$/); if(!mt) continue;
      const feeder=cards[mt[1]]; if(!feeder) continue;
      const a=at(feeder,true), b=at(cards[n],false), mx=(a.x+b.x)/2;

function koAnimateScroll(wrap, to, dur){
  if(_koAnim) cancelAnimationFrame(_koAnim);
  to=Math.max(0, Math.min(to, wrap.scrollWidth - wrap.clientWidth));
  const from=wrap.scrollLeft, dist=to-from, t0=performance.now();
  if(Math.abs(dist)<1){ wrap.scrollLeft=to; return; }
  // 距離に応じて長め（最大1秒）にして、加速も減速も滑らかなeaseInOutCubicでぬるっと
  dur = dur || Math.min(1000, Math.max(520, Math.abs(dist)*0.9));
  const ease=p => p<0.5 ? 4*p*p*p : 1-Math.pow(-2*p+2,3)/2;
  (function step(now){
    const p=Math.min(1,(now-t0)/dur);
    wrap.scrollLeft=from+dist*ease(p);
    _koAnim = p<1 ? requestAnimationFrame(step) : 0;
  })(t0);
}

  const wrap=document.getElementById("bracket-wrap"); const els=koRoundEls();

let _cdTimer=null;
function renderCountdown(){
  const el=document.getElementById("next-match"); if(!el || !DATA) return;
  const now=Date.now();
  const nx=allMatchesByTime().find(x=>x.t>now);
  if(!nx){ el.innerHTML='<span class="nm-label">🏆 全日程終了 — お疲れさまでした！</span>'; return; }
  const m=nx.m;
  let teams;
  if(nx.ko){
    const h=slotTeam("actual",m,"home")||slotTeam("pred",m,"home");
    const a=slotTeam("actual",m,"away")||slotTeam("pred",m,"away");
    teams=(h&&a)?`${teamJa(h)} vs ${teamJa(a)}`:(m.title||`第${m.n}試合`);
  } else teams=`${teamJa(m.home)} vs ${teamJa(m.away)}`;
  const s=Math.max(0,Math.floor((nx.t-now)/1000));
  const d=Math.floor(s/86400),h=Math.floor(s%86400/3600),mi=Math.floor(s%3600/60),se=s%60;
  const p=x=>String(x).padStart(2,"0");
  const cd=d>0?`${d}日 ${p(h)}:${p(mi)}:${p(se)}`:`${p(h)}:${p(mi)}:${p(se)}`;
  el.innerHTML=`<span class="nm-tag">NEXT</span><span class="nm-teams">${esc(teams)}</span><span class="nm-jst">${fmtJST(m,false)} JST</span><span class="nm-cd">⏱ <b>${cd}</b></span>`;
}
function startCountdown(){ if(_cdTimer) clearInterval(_cdTimer); tick(); _cdTimer=setInterval(tick,1000); }
function tick(){ renderCountdown(); refreshWarnings(); }

/* ============ 未予想アラート（8時間前・1時間前） ============ */
const WARN_MS=8*60*60*1000;   // 8時間以内の未予想を通知（1時間以内は緊急表示）
const WARN_URGENT_MS=60*60*1000;
let _warnDismiss=new Set(), _warnSig="", _notifyOn=false, _notified=new Set();
function imminentUnpredicted(){
  const now=Date.now(), out=[];
  const consider=(m,ko)=>{
    const t=kickoffTime(m.n); if(!t) return;
    const dt=t-now; if(dt<=0 || dt>WARN_MS) return;
    let teams, predicted;
    if(ko){
      const h=slotTeam("pred",m,"home"), a=slotTeam("pred",m,"away");
      if(!h||!a) return;                 // 対戦カード未確定は予想不可なので対象外
      predicted=!!state.pred.ko[m.n]; teams=`${teamJa(h)} vs ${teamJa(a)}`;
    } else { predicted=!!matchEntry("pred",m.n).o; teams=`${teamJa(m.home)} vs ${teamJa(m.away)}`; }
    if(!predicted) out.push({m,t,dt,ko,teams});
  };
  for(const m of DATA.groupMatches) consider(m,false);
  for(const m of DATA.allKO) consider(m,true);
  out.sort((a,b)=>a.t-b.t);
  return out;
}
function refreshWarnings(){
  const el=document.getElementById("warn-banner"); if(!el||!DATA) return;
  const list=imminentUnpredicted().filter(x=>!_warnDismiss.has(x.m.n));
  if(_notifyOn) for(const x of list){ if(!_notified.has(x.m.n)){ _notified.add(x.m.n); fireNotify(x); } }
  const sig=list.map(x=>x.m.n+":"+Math.ceil(x.dt/60000)).join(",")+"|"+(_notifyOn?1:0);
  if(sig===_warnSig) return;            // 変化なしならDOM更新しない
  _warnSig=sig;
  if(!list.length){ el.style.display="none"; el.innerHTML=""; return; }
  el.style.display="";
  const rows=list.map(x=>{
    const tab=x.ko?"ko":"groups", urgent=x.dt<=WARN_URGENT_MS;
    return `<div class="warn-row${urgent?" urgent":""}"><span class="warn-time">${warnTimeLabel(x.dt)}</span><span class="warn-teams">${esc(x.teams)}</span><span class="warn-jst">${fmtJST(x.m,false)} JST</span><button onclick="gotoPredict('${tab}')">予想する</button><button class="warn-x" onclick="dismissWarn(${x.m.n})" title="この警告を消す">✕</button></div>`;
  }).join("");
  const notifyBtn=("Notification" in window && !_notifyOn) ? `<button class="warn-notify" onclick="enableNotify()">通知をON</button>` : "";
  el.innerHTML=`<div class="warn-head"><b>未予想の試合があります（8時間以内）</b>${notifyBtn}</div>${rows}`;
}
function warnTimeLabel(ms){
  const s=Math.max(0,Math.floor(ms/1000)), h=Math.floor(s/3600), m=Math.floor(s%3600/60);
  return h>=1 ? `あと${h}時間${m>0?m+"分":""}` : `あと${Math.max(1,m)}分`;
}
function gotoPredict(tab){ setTab(tab); if(tab==="groups") setMode("pred"); window.scrollTo({top:0,behavior:"smooth"}); }
function dismissWarn(n){ _warnDismiss.add(n); _warnSig=""; refreshWarnings(); }
function enableNotify(){
  if(!("Notification" in window)){ alert("このブラウザは通知に対応していません。"); return; }
  Notification.requestPermission().then(p=>{ _notifyOn=(p==="granted"); _warnSig=""; refreshWarnings();
    if(p!=="granted") alert("通知が許可されませんでした。ブラウザの設定から許可できます。"); });
}
function fireNotify(x){
  try{ new Notification("⚽ まもなく開始（未予想）", {body:`${x.teams}\n${fmtJST(x.m,false)} JST 開始 — 予想がまだです！`}); }catch(_){}
}

/* ============ 3Dティルト & パララックス ============ */
const TILT_SEL=".group-card,.ko-card,.cmp-card,.champion";
let _tiltEl=null, _tiltRAF=null, _ptr={x:0,y:0,has:false};
if(!_reduceMotion){
  document.addEventListener("mousemove",e=>{
    _ptr.x=e.clientX; _ptr.y=e.clientY; _ptr.has=true;
    const el=e.target.closest?e.target.closest(TILT_SEL):null;
    if(el!==_tiltEl){ if(_tiltEl) _tiltEl.style.transform=""; _tiltEl=el; }
    if(el){
      const r=el.getBoundingClientRect();
      const px=(e.clientX-r.left)/r.width-0.5, py=(e.clientY-r.top)/r.height-0.5;
      el.style.transform=`perspective(1000px) rotateX(${(-py*5).toFixed(2)}deg) rotateY(${(px*7).toFixed(2)}deg) translateY(-3px)`;
      el.style.setProperty("--mx",((e.clientX-r.left)/r.width*100).toFixed(1)+"%");
      el.style.setProperty("--my",((e.clientY-r.top)/r.height*100).toFixed(1)+"%");
    }
    if(!_tiltRAF) _tiltRAF=requestAnimationFrame(applyParallax);
  });
  document.addEventListener("mouseleave",()=>{ if(_tiltEl){_tiltEl.style.transform="";_tiltEl=null;} },true);
}
function applyParallax(){
  _tiltRAF=null;
  if(!_ptr.has) return;
  const dx=(_ptr.x/innerWidth-0.5), dy=(_ptr.y/innerHeight-0.5);
  document.documentElement.style.setProperty("--par-x",(dx*-18).toFixed(1)+"px");
  document.documentElement.style.setProperty("--par-y",(dy*-18).toFixed(1)+"px");
}

/* ============ オンライン共有ルーム（Firebase・config埋め込み式） ============ */
let _sync={db:null,fs:null,unsub:null,ready:false};
function roomEnabled(){ return !!ROOM_CONFIG; }
function syncOnline(){ return !!(_sync.ready && state.room && state.room.code); }
async function loadFirebase(){
  if(window._fbLib) return window._fbLib;
  const app =await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js");
  const fs  =await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
  const auth=await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js");
  window._fbLib={app,fs,auth}; return window._fbLib;
}
async function startSync(){
  if(!roomEnabled() || !state.room || !state.room.code) return;
  const {app,fs,auth}=await loadFirebase();
  if(_sync.unsub){ _sync.unsub(); _sync.unsub=null; }
  const appName="wc-"+state.room.code;
  let fbApp; try{ fbApp=app.getApp(appName); }catch(_){ fbApp=app.initializeApp(ROOM_CONFIG,appName); }
  const a=auth.getAuth(fbApp);
  const cred=await auth.signInAnonymously(a);
  state.me.id=cred.user.uid;                 // 所有者＝自分の認証UID
  const db=fs.getFirestore(fbApp);
  _sync.db=db; _sync.fs=fs; _sync.ready=true;
  await syncPush();
  const col=fs.collection(db,"rooms",state.room.code,"players");
  _sync.unsub=fs.onSnapshot(col,(snap)=>{
    snap.docChanges().forEach(ch=>{
      const d=ch.doc.data()||{};
      const clean=cleanIncomingPlayer({...d, id:d.id||ch.doc.id});
      if(!clean || clean.id===state.me.id) return;
      if(ch.type==="removed") delete state.players[clean.id];
      else state.players[clean.id]=clean;
    });
    localStorage.setItem(LS_KEY, JSON.stringify(state));
    if(ui.tab==="league") render(); else updatePlayerChip();
  },(err)=>{ console.warn("onSnapshot",err); setFetchStatus("オンライン同期エラー（接続/ルールを確認）", "warn"); });
}
async function syncPush(){
  if(!_sync.ready || !_sync.db) return;
  const {fs,db}=_sync;
  const ref=fs.doc(db,"rooms",state.room.code,"players",state.me.id);
  const base={id:state.me.id,name:state.me.name||"あなた",color:state.me.color,pred:state.pred,bets:state.bets,ts:Date.now()};
  const doc = state.me.avatar ? {...base, avatar:sanitizeAvatar(state.me.avatar)} : base;
  try{ await fs.setDoc(ref, doc); }
  catch(e){
    // ルール未更新でavatarが弾かれても、予想同期は死守（avatarなしで再送）
    if(state.me.avatar){ try{ await fs.setDoc(ref, base); }catch(e2){ console.warn("push",e2); } }
    else console.warn("push",e);
  }
}
/* ===== 個人ログインコード（スマホ・PCで同じユーザーとして同期） ===== */
let _acct={db:null,fs:null,unsub:null,ready:false,status:""};   // status: ""|"ok"|"denied"|"error"
const SESSION = uid();   // この端末セッションの識別子（自分の書き込みエコー判定用）
function accountActive(){ return !!(_acct.ready && state.account); }
function setAcctStatus(s){ if(_acct.status===s) return; _acct.status=s; if(document.getElementById("acct-code")||document.querySelector(".acct-box")) refreshSettings(); }
function accountBoxHTML(){
  if(!roomEnabled()) return "";
  if(accountActive()){
    const st=_acct.status;
    const statusLine = st==="ok"
      ? `<p class="hint" style="font-size:11px;color:var(--green)">✅ クラウド同期ON。同じコードの端末すべてで、予想・ベット・プロフィールが自動同期されます。</p>`
      : st==="denied"
      ? `<p class="hint" style="font-size:11px;color:#ff9166">⚠️ ログインはできましたが<b>クラウド同期がブロック</b>されています（Firestoreルール未設定）。Firebaseコンソール→Firestore→ルールに <code>users/{code}</code> の許可を追加して公開してください。</p>`
      : st==="error"
      ? `<p class="hint" style="font-size:11px;color:#ff9166">⚠️ 同期エラー（ネット接続を確認してください）。</p>`
      : `<p class="hint" style="font-size:11px;color:var(--sub)">…クラウドに接続中</p>`;
    const pushBtn = (st==="ok")
      ? `<button class="set-btn" style="margin-top:6px" onclick="accountForcePush()">📤 この端末の内容をクラウドに保存（上書き）</button>` : "";
    return `<div class="set-label">端末間ログイン</div>
      <div class="acct-box on"><span class="online-status on">● ログイン中：${esc(state.account)}</span>
        <button class="set-btn" onclick="accountLogout()">ログアウト</button></div>
      ${statusLine}${pushBtn}`;
  }
  return `<div class="set-label">端末間ログイン（スマホとPCで同じ予想を使う）</div>
    <div class="acct-box"><input id="acct-code" class="set-input" maxlength="60" placeholder="ログインコード（自分で決める・4文字以上）">
      <button class="set-btn primary" onclick="accountLogin()">ログイン / 作成</button></div>
    <p class="hint" style="font-size:11px">好きなコードを決めて、スマホとPCで同じものを入力すると同じユーザーになります。<br>
      ⚠️ そのコードに既に予想がある場合、この端末の今の予想はクラウドの内容に置き換わります。<br>
      ※ コードを知っている人は同期に入れます。<b>長め・推測されにくいコード</b>にしてください。</p>`;
}
async function startAccountSync(){
  if(!roomEnabled() || !state.account) return;
  const {app,fs,auth}=await loadFirebase();
  if(_acct.unsub){ _acct.unsub(); _acct.unsub=null; }
  let fbApp; try{ fbApp=app.getApp("wc-acct"); }catch(_){ fbApp=app.initializeApp(ROOM_CONFIG,"wc-acct"); }
  await auth.signInAnonymously(auth.getAuth(fbApp));
  const db=fs.getFirestore(fbApp);
  _acct.db=db; _acct.fs=fs; _acct.ready=true;
  const ref=fs.doc(db,"users",state.account);
  _acct.unsub=fs.onSnapshot(ref,(snap)=>{
    setAcctStatus("ok");                                         // スナップショット受信＝読み取り成功
    if(snap.metadata && snap.metadata.hasPendingWrites) return;  // 自分の書き込み（未確定）は無視
    if(!snap.exists()){ accountPush(); return; }                 // クラウド未作成→今の端末の内容で初期化
    const d=snap.data()||{};
    if(d.writer && d.writer===SESSION) return;                   // 自分の端末の書き込みエコーは無視
    state.pred=cleanPred(d.pred);
    state.bets=cleanBets(d.bets);
    if(typeof d.name==="string" && d.name) state.me.name = sanitizeName(d.name).slice(0,16);  // 空名で既存の名前を消さない
    if(d.color) state.me.color=safeColor(d.color);
    const inAv=sanitizeAvatar(d.avatar); if(inAv) state.me.avatar=inAv;                        // 空アバターで既存写真を消さない
    localStorage.setItem(LS_KEY, JSON.stringify(state));
    render(); updatePlayerChip(); refreshSettings();
    if(_sync.ready) syncPush();                                  // ルームにも反映
    setFetchStatus("ほかの端末の変更を反映しました", "ok");
  },(err)=>{ console.warn("acct snapshot",err);
    setAcctStatus((err&&err.code==="permission-denied")?"denied":"error");
    setFetchStatus("アカウント同期エラー（Firestoreルールを確認）","warn"); });
}
async function accountPush(){
  if(!_acct.ready || !_acct.db || !state.account) return;
  const ref=_acct.fs.doc(_acct.db,"users",state.account);
  let name = state.me.name||"";
  let avatar = state.me.avatar ? sanitizeAvatar(state.me.avatar) : "";
  // 自分の名前/写真が空なら、クラウドの既存値を維持（空で他端末のプロフィールを潰さない）
  if(!name || !avatar){
    try{ const cur=await _acct.fs.getDoc(ref);
      if(cur.exists()){ const cd=cur.data()||{};
        if(!name && typeof cd.name==="string" && cd.name) name=cd.name;
        if(!avatar && cd.avatar) avatar=sanitizeAvatar(cd.avatar);
      }
    }catch(_){}
  }
  const base={pred:state.pred, bets:state.bets, name:name, color:state.me.color, writer:SESSION, ts:Date.now()};
  const docData = avatar ? {...base, avatar:avatar} : base;
  try{ await _acct.fs.setDoc(ref, docData); setAcctStatus("ok"); }
  catch(e){
    if(avatar){ try{ await _acct.fs.setDoc(ref, base); setAcctStatus("ok"); }catch(e2){ setAcctStatus((e2&&e2.code==="permission-denied")?"denied":"error"); console.warn("acctPush",e2); } }
    else { setAcctStatus((e&&e.code==="permission-denied")?"denied":"error"); console.warn("acctPush",e); }
  }
}
async function accountLogin(){
  const v=((document.getElementById("acct-code")||{}).value||"");
  const code=v.trim().replace(/[^A-Za-z0-9_-]/g,"_").slice(0,60);
  if(code.length<4){ alert("ログインコードは英数字・-・_ で4文字以上にしてください。"); return; }
  state.account=code; _acct.status=""; save();
  setFetchStatus("アカウントにログイン中…","loading");
  try{
    await startAccountSync();
    // 同期が本当に通るか明示確認（ルール未設定なら permission-denied）
    try{
      await _acct.fs.getDoc(_acct.fs.doc(_acct.db,"users",code));
      setAcctStatus("ok");
      setFetchStatus("ログインしました（同期ON）","ok");
    }catch(rerr){
      const denied=/permission-denied/.test((rerr&&rerr.code)||"");
      setAcctStatus(denied?"denied":"error");
      setFetchStatus("ログインしましたが同期できません","warn");
      if(denied) alert("ログインはできましたが、クラウド同期がFirestoreルールでブロックされています。\n\nFirebaseコンソール → Firestore Database → ルール に、users/{code} を許可する設定を追加して「公開」してください。\n（チャットに貼ったルールをそのまま貼り付ければOKです）");
    }
  }catch(e){ console.error(e); let msg=(e&&e.message)||e;
    if(/operation-not-allowed|admin-restricted|configuration-not-found/.test((e&&e.code)||"")) msg="Firebaseの「匿名ログイン」が有効になっていません。";
    alert("ログインに失敗しました：\n"+msg); }
  refreshSettings(); render();
}
async function accountForcePush(){
  if(!accountActive()){ alert("ログインしていません。"); return; }
  setFetchStatus("クラウドに保存中…","loading");
  await accountPush();
  if(_acct.status==="ok"){
    setFetchStatus("クラウドに保存しました","ok");
    alert("この端末の予想・プロフィールをクラウドに保存しました。\n\n他の端末は自動で最新に更新されます（すぐ反映されない場合は、他の端末でページを再読み込みしてください）。");
  } else {
    alert("保存できませんでした。Firestoreルールの設定を確認してください。");
  }
  refreshSettings();
}
function accountLogout(){
  if(!confirm("ログアウトしますか？\nこの端末に予想は残りますが、他の端末との自動同期は止まります。")) return;
  if(_acct.unsub){ _acct.unsub(); _acct.unsub=null; }
  _acct.ready=false; _acct.db=null;
  state.account="";
  save(); refreshSettings(); render();
  setFetchStatus("ログアウトしました","none");
}
function initSync(){
  if(!roomEnabled()) return;
  if(state.account) startAccountSync().catch(e=>console.warn("acct-sync",e));
  if(state.room && state.room.code) startSync().catch(e=>console.warn("auto-sync",e));
}
async function joinRoom(){
  const code=((document.getElementById("room-code")||{}).value||"").trim().replace(/[^A-Za-z0-9_-]/g,"_").slice(0,40);
  const name=((document.getElementById("room-name")||{}).value||"").trim();
  if(!code){ alert("合言葉（部屋コード）を入力してください。"); return; }
  if(name) state.me.name=sanitizeName(name).slice(0,16);
  state.room.code=code; save();
  setFetchStatus("ルームに参加中…", "loading");
  try{ await startSync(); setFetchStatus("ルームに参加しました", "ok"); }
  catch(e){ console.error(e); const c=(e&&e.code)||"";
    let msg=(e&&e.message)||e;
    if(/operation-not-allowed|admin-restricted|configuration-not-found/.test(c)) msg="Firebaseの「匿名ログイン」が有効になっていません。";
    alert("参加に失敗しました：\n"+msg); _sync.ready=false; }
  render();
}
function leaveRoom(){
  if(!confirm("ルームから退出しますか？（あなたの予想は端末に残ります）")) return;
  try{ if(_sync.unsub){_sync.unsub();_sync.unsub=null;}
    if(_sync.ready&&_sync.fs&&_sync.db) _sync.fs.deleteDoc(_sync.fs.doc(_sync.db,"rooms",state.room.code,"players",state.me.id)).catch(()=>{});
  }catch(_){}
  _sync.ready=false;_sync.db=null; state.room.code=""; save(); render();
}
function renderOnlineBox(){
  if(!roomEnabled()) return "";   // 幹事が未設定ならオンライン欄は出さない
  const on=syncOnline();
  let html='<div class="league-section online-main"><h3>👥 友達と一緒に遊ぶ（オンライン）</h3>';
  html+='<div class="online-box">';
  if(on){
    html+=`<div class="row"><span class="online-status on">● 参加中　合言葉: <b>${esc(state.room.code)}</b></span><button onclick="leaveRoom()">退出する</button></div>`;
    html+=`<p class="hint">✅ あなたの予想・ベットは自動でこのルームに同期中。<b>友達がこのページのURLを開き、同じ合言葉「${esc(state.room.code)}」で参加</b>すると、上の順位表にリアルタイムで並びます。<br>コードを送り合う必要はありません。友達には「このページのURL」と「合言葉」を伝えるだけ。</p>`;
  } else {
    html+=`<p class="hint"><b>コードの送り合いは不要</b>になりました。同じ<b>合言葉</b>を入れた人どうしが、自動で同じリーグに集まります。<br>
      <b>① </b>好きな合言葉と表示名を入れて「参加する」（合言葉は自分で決めるだけ・事前登録不要）<br>
      <b>② </b>友達に「<b>このページのURL</b>」と「<b>同じ合言葉</b>」を伝える<br>
      <b>③ </b>全員の予想・順位がリアルタイムで自動同期されます</p>`;
    html+=`<div class="row"><input id="room-code" placeholder="合言葉（自分で決める／例: bambam-cup-7h3k）" value="${esc(state.room.code)}"><input id="room-name" placeholder="あなたの表示名" value="${esc(state.me.name)}"><button class="join-btn" onclick="joinRoom()">参加</button></div>`;
    html+=`<p class="hint" style="font-size:11px">※ <code>test</code> や <code>worldcup</code> など定番ワードは他人と被る恐れあり。<b>苗字＋好きな数字</b>のような独自の合言葉にしてください。</p>`;
  }
  html+='</div></div>';
  return html;
}
